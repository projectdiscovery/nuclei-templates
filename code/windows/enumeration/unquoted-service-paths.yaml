id: unquoted-service-paths

info:
  name: Unquoted Service Paths
  author: domwhewell-sage
  severity: high
  description: |
    Detects windows services with unquoted paths that contain spaces. This misconfiguration can lead to local privilege escalation via execution of a malicious binary placed in the path.
  reference:
    - https://book.hacktricks.wiki/en/windows-hardening/windows-local-privilege-escalation/index.html#unquoted-service-paths
  metadata:
    verified: true
  tags: windows,services,code,windows-audit

self-contained: true

code:
  - pre-condition: |
      IsWindows();
    engine:
      - powershell
      - powershell.exe
    args:
      - -ExecutionPolicy
      - Bypass
    pattern: "*.ps1"
    source: |
      # Get services using WMI
      $services = Get-WmiObject -class Win32_Service -Property Name, DisplayName, PathName, StartMode | Where {$_.PathName -notlike "C:\Windows*" -and $_.PathName -notlike '"*'} | select Name,DisplayName,StartMode,PathName

      foreach ($service in $services) {
        $path = $service.PathName
        if ($path -match ' ') {
          $binaryPath = $path.Split("/")[0]
          if (Test-Path "$binaryPath") {
            Write-Output "$($service.Name) : $path"
          }
        }
      }

    extractors:
      - type: regex
        regex:
          - ".+ : .+"