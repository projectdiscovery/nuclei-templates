id: k8s-hostpath-volume

info:
  name: Kubernetes hostPath Volume Usage
  author: geeknik
  severity: medium
  description: hostPath mounts can expose host filesystems and increase container escape risk.
  remediation: Prefer CSI, emptyDir, configMap, or secret volumes; avoid hostPath unless strictly required.
  reference:
    - https://kubernetes.io/docs/concepts/storage/volumes/#hostpath
    - https://kubernetes.io/docs/concepts/security/pod-security-standards/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 6.4
    cwe-id: CWE-668
  tags: file,kubernetes,k8s,misconfig,container

file:
  - extensions:
      - yml
      - yaml
      - json

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '(?mi)^\s*apiVersion\s*:'

      - type: regex
        regex:
          - '(?mi)^\s*hostPath\s*:'
