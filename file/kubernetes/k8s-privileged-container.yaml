id: k8s-privileged-container

info:
  name: Kubernetes Privileged Container Enabled
  author: geeknik
  severity: high
  description: Privileged containers disable key isolation boundaries and increase host compromise risk.
  remediation: Disable privileged mode and enforce restricted Pod Security Standards.
  reference:
    - https://kubernetes.io/docs/concepts/security/pod-security-standards/
    - https://kubernetes.io/docs/concepts/security/linux-kernel-security-constraints/
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 8.8
    cwe-id: CWE-250
  tags: file,kubernetes,k8s,misconfig,container

file:
  - extensions:
      - yml
      - yaml
      - json

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '(?mi)^\s*apiVersion\s*:'

      - type: regex
        regex:
          - '(?mi)^\s*kind\s*:'

      - type: regex
        regex:
          - '(?mi)^\s*privileged\s*:\s*true\b'
