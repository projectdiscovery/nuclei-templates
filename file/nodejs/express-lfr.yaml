id: express-lfr

info:
  name: Express - Local File Read
  author: me_dheeraj (https://twitter.com/Dheerajmadhukar),geeknik
  severity: info
  description: Untrusted user input in express render() function can result in arbitrary file read if hbs templating is used.
  tags: file,nodejs,express,lfr
file:
  - extensions:
      - all
    matchers:
      - type: regex
        regex:
          - "\\.render\\(\\s*(req|request)\\.(query|body|params|headers|cookies)\\.[A-Za-z_][A-Za-z0-9_]*"
          - "\\.render\\(\\s*(req|request)\\.(query|body|params|headers|cookies)\\[[^\\]]+\\]"
          - "\\.render\\(\\s*[^,]+,\\s*\\{[^\\}]*\\b(req|request)\\.(query|body|params|headers|cookies)\\b"
        condition: or
