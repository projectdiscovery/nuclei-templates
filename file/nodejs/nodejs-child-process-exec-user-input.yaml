id: nodejs-child-process-exec-user-input

info:
  name: Node.js Child Process Execution With User Input
  author: geeknik
  severity: high
  description: Executing child_process commands with user-controlled input can lead to command injection.
  remediation: Avoid shell execution for untrusted input; use allowlists and argument arrays.
  reference:
    - https://nodejs.org/api/child_process.html
    - https://owasp.org/www-community/attacks/Command_Injection
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-78
  tags: file,nodejs,javascript,command-injection,sast

file:
  - extensions:
      - js
      - ts

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '(?mi)\b(?:require\([''"]child_process[''"]\)|from\s+[''"]child_process[''"])\b'

      - type: regex
        regex:
          - '(?mi)\b(?:exec|execSync|spawn|spawnSync)\s*\([^)]*\b(?:req|request)\.(?:query|body|params|headers)\b'
          - '(?mi)\b(?:exec|execSync|spawn|spawnSync)\s*\([^)]*\bprocess\.argv\b'
        condition: or
