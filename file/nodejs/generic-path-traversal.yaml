id: generic-path-traversal

info:
  name: Generic - Path Traversal
  author: me_dheeraj (https://twitter.com/Dheerajmadhukar),geeknik
  severity: info
  description: Untrusted user input in readFile()/readFileSync() can endup in Directory Traversal Attacks.
  tags: file,nodejs
file:
  - extensions:
      - all
    matchers:
      - type: regex
        regex:
          - "(createReadStream|readFile|readFileSync|readFileAsync)\\(\\s*(req|request)\\.(query|body|params)\\.[A-Za-z_][A-Za-z0-9_]*"
          - "(createReadStream|readFile|readFileSync|readFileAsync)\\(\\s*(req|request)\\.(query|body|params)\\[[^\\]]+\\]"
          - "(createReadStream|readFile|readFileSync|readFileAsync)\\([^\\)]*\\b(req|request)\\.(query|body|params)\\b[^\\)]*\\)"
        condition: or
