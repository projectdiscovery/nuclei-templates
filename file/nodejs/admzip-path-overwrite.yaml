id: admzip-path-overwrite

info:
  name: Admzip Path Overwrite
  author: me_dheeraj (https://twitter.com/Dheerajmadhukar),geeknik
  severity: info
  description: Insecure ZIP archive extraction using adm-zip can result in arbitrary path over write and can result in code injection.
  tags: file,nodejs,admzip
file:
  - extensions:
      - all
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "require\\(['\\\"]adm-zip['\\\"]\\)"
          - "new\\s+AdmZip\\("
        condition: or

      - type: regex
        regex:
          - "\\.extractAllTo\\("
          - "\\.extractEntryTo\\("
          - "\\.getEntries\\(\\)\\.forEach\\("
          - "\\.entryName\\b"
          - "\\.writeFile(Sync)?\\("
        condition: or
