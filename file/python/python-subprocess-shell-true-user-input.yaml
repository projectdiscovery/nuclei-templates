id: python-subprocess-shell-true-user-input

info:
  name: Python subprocess shell=True With Untrusted Input
  author: geeknik
  severity: high
  description: Using subprocess with shell=True and untrusted input may enable command injection.
  remediation: Avoid shell=True, pass argument arrays, and validate/allowlist user input.
  reference:
    - https://docs.python.org/3/library/subprocess.html#security-considerations
    - https://owasp.org/www-community/attacks/Command_Injection
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-78
  tags: file,python,sast,command-injection

file:
  - extensions:
      - py

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '(?mi)\bsubprocess\.(?:run|Popen|call|check_output)\s*\('

      - type: regex
        regex:
          - '(?mi)\bshell\s*=\s*True\b'

      - type: regex
        regex:
          - '(?mi)\b(?:request\.(?:args|form|values|get_json)|input\s*\(|sys\.argv)\b'
