id: php-scanner

info:
  name: PHP Scanner
  author: geeknik
  severity: info
  tags: php,file
file:
  - extensions:
      - html
      - htm
      - phtml
      - php
      - php3
      - php4
      - php5
      - phps
      - cgi
      - inc
      - tpl
      - test
      - module
      - plugin

    extractors:
      - type: regex
        # Investigate for possible SQL Injection
        # Likely vulnerable: $dbConn->GetRow("SELECT * FROM users WHERE id = $user_id");
        # Likely not Vulnerable: $dbConn->GetRow("SELECT * FROM users WHERE id = ?", array('$user_id'));
        regex:
          - '(?i)\b(?:getone|getrow|getall|getcol|getassoc|execute|replace)\s*\('

      - type: regex
        # Warn when var_dump is found
        regex:
          - '\bvar_dump\s*\('

      - type: regex
        # Warn when display_errors is enabled manually
        regex:
          - '\bdisplay_errors\b'

      - type: regex
        # Avoid the use of eval()
        regex:
          - '\beval\s*\('
          - '\beval\s*\((base64|eval|\$_|\$\$|\$[A-Za-z_0-9\{]*(\(|\{|\[))'

      - type: regex
        # Avoid the use of exit or die()
        regex:
          - '\b(?:exit|die)\s*(?:\(|;)'

      - type: regex
        # Avoid the use of logical operators (ex. using and over &&)
        regex:
          - '\bif\s*\([^)]*\sand\s+[^)]*\)'

      - type: regex
        # Avoid the use of the ereg* functions (now deprecated)
        regex:
          - '\bereg(?:i|_replace)?\s*\('

      - type: regex
        # Ensure that the second parameter of extract is set to not overwrite (not EXTR_OVERWRITE)
        regex:
          - '\bextract\s*\('

      - type: regex
        # Checking output methods (echo, print, printf, print_r, vprintf, sprintf) that use variables in their options
        regex:
          - '\becho\s+\$'
          - '\bprint\s+\$'
          - '\b(?:printf|print_r|vprintf|sprintf)\s*\('

      - type: regex
        # Ensuring you're not using echo with file_get_contents
        regex:
          - '\bfile_get_contents\s*\('

      - type: regex
        # Testing for the system execution functions and shell exec (backticks)
        regex:
          - '`[^`]+`'

      - type: regex
        # Use of readfile, readlink and readgzfile
        regex:
          - '\b(?:readfile|readlink|readgzfile)\s*\('

      - type: regex
        # Using parse_str or mb_parse_str (writes values to the local scope)
        regex:
          - '\b(?:parse_str|mb_parse_str)\s*\('

      - type: regex
        # Using session_regenerate_id either without a parameter or using false
        regex:
          - '\bsession_regenerate_id\s*\('

      - type: regex
        # Avoid use of $_REQUEST (know where your data is coming from)
        regex:
          - '\\$_REQUEST'

      - type: regex
        # Don't use mysql_real_escape_string
        regex:
          - '\bmysql_real_escape_string\s*\('

      - type: regex
        # Avoiding use of import_request_variables
        regex:
          - '\bimport_request_variables\s*\('

      - type: regex
        # Avoid use of GLOBALS
        regex:
          - '\$GLOBALS\b'

      - type: regex
        regex:
          - '\$_GET\b'

      - type: regex
        regex:
          - '\$_POST\b'

      - type: regex
        regex:
          - '\$_COOKIE\b'

      - type: regex
        regex:
          - '\$_SESSION\b'

      - type: regex
        # Ensure the use of type checking validating against booleans (===)
        regex:
          - '\\=\\=\\='

      - type: regex
        # Ensure that the /e modifier isn't used in regular expressions (execute)
        regex:
          - '\\/e'

      - type: regex
        # Using concatenation in header() calls
        regex:
          - '\bheader\s*\('

      - type: regex
        # Avoiding the use of $http_raw_post_data
        regex:
          - '\\$http_raw_post_data'

      - type: regex
        # interesting functions for POP/Unserialize
        regex:
          - "__autoload"
          - "__destruct"
          - "__wakeup"
          - "__toString"
          - "__call"
          - "__callStatic"
          - "__get"
          - "__set"
          - "__isset"
          - "__unset"

      - type: regex
        # phpinfo detected
        regex:
          - '\bphpinfo\s*\('

      - type: regex
        # registerPHPFunctions() allows code exec in XML
        regex:
          - '\bregisterPHPFunctions\s*\('

      - type: regex
        regex:
          - '\bsession_start\s*\('

      - type: regex
        # dBase DBMS
        regex:
          - '\bdbase_open\s*\('

      - type: regex
        # DB++ DBMS
        regex:
          - '\b(?:dbplus_open|dbplus_ropen)\s*\('

      - type: regex
        # Frontbase DBMS
        regex:
          - '\bfbsql_connect\s*\('

      - type: regex
        # Informix DBMS
        regex:
          - '\bifx_connect\s*\('

      - type: regex
        # IBM DB2 DBMS
        regex:
          - '\bdb2_(?:p)?connect\s*\('

      - type: regex
        # FTP server
        regex:
          - '\bftp_(?:ssl_)?connect\s*\('

      - type: regex
        # Ingres DBMS
        regex:
          - '\bingres_(?:p)?connect\s*\('

      - type: regex
        # LDAP server
        regex:
          - '\bldap_connect\s*\('

      - type: regex
        # msession server
        regex:
          - '\bmsession_connect\s*\('

      - type: regex
        # mSQL DBMS
        regex:
          - '\bmsql_(?:p)?connect\s*\('

      - type: regex
        # MsSQL DBMS
        regex:
          - '\bmssql_(?:p)?connect\s*\('

      - type: regex
        # MySQL DBMS
        regex:
          - '\bmysql_(?:p)?connect\s*\('

      - type: regex
        # MySQLi Extension
        regex:
          - '\b(?:mysqli(?:_real)?_connect|mysqli?_query)\s*\('

      - type: regex
        # Oracle OCI8 DBMS
        regex:
          - '\b(?:oci_(?:new_)?connect|oci_(?:n|p)?logon)\s*\('

      - type: regex
        # Oracle DBMS
        regex:
          - '\bora_(?:p)?connect\s*\('

      - type: regex
        # Ovrimos SQL DBMS
        regex:
          - '\bovrimos_connect\s*\('

      - type: regex
        # PostgreSQL DBMS
        regex:
          - '\bpg_(?:p)?connect\s*\('

      - type: regex
        # SQLite DBMS
        regex:
          - '\bsqlite_(?:p)?open\s*\('

      - type: regex
        # SQLite3 DBMS
        regex:
          - '\bSQLite3\s*\('

      - type: regex
        # Sybase DBMS
        regex:
          - '\bsybase_(?:p)?connect\s*\('

      - type: regex
        # TokyoTyrant DBMS
        regex:
          - '\bTokyoTyrant\b'

      - type: regex
        # XML document
        regex:
          - '\bx(?:ptr|path)_new_context\s*\('

      - type: regex
        # Investigate if GetTableFields is called safely
        regex:
          - '\bGetTableFields\s*\('

      - type: regex
        regex:
          - '\bini_get\s*\(\s*["'']magic_quotes_gpc["'']\s*\)'
