id: terraform-open-cidr-ingress

info:
  name: Terraform Open Ingress CIDR
  author: geeknik
  severity: high
  description: Security rules allowing 0.0.0.0/0 or ::/0 expose services to the public internet.
  remediation: Restrict ingress CIDRs to trusted source ranges and least-privilege access.
  reference:
    - https://registry.terraform.io/providers/hashicorp/aws/latest/docs/resources/security_group
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa22-054a
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 8.1
    cwe-id: CWE-284
  tags: file,terraform,iac,misconfig,network

file:
  - extensions:
      - tf

    matchers:
      - type: regex
        regex:
          - '(?mi)^\s*(?:cidr_blocks|cidr_block)\s*=\s*\[[^\]]*\b0\.0\.0\.0/0\b[^\]]*\]'
          - '(?mi)^\s*(?:ipv6_cidr_blocks|ipv6_cidr_block)\s*=\s*\[[^\]]*\b::/0\b[^\]]*\]'
          - '(?mi)^\s*(?:cidr_blocks|cidr_block)\s*=\s*["'']0\.0\.0\.0/0["'']'
          - '(?mi)^\s*(?:ipv6_cidr_blocks|ipv6_cidr_block)\s*=\s*["'']::/0["'']'
        condition: or
