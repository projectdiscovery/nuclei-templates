id: terraform-hardcoded-cloud-credentials

info:
  name: Terraform Hardcoded Cloud Credentials
  author: geeknik
  severity: high
  description: Hardcoded access credentials in Terraform files can leak and be abused.
  remediation: Use environment variables, vault-backed providers, and rotate any exposed credentials.
  reference:
    - https://developer.hashicorp.com/terraform/language/manage-sensitive-data
    - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 8.1
    cwe-id: CWE-798
  tags: file,terraform,iac,misconfig,credentials

file:
  - extensions:
      - tf

    matchers:
      - type: regex
        regex:
          - '(?mi)^\s*(?:aws_)?access_key(?:_id)?\s*=\s*["''][A-Z0-9]{16,}["'']'
          - '(?mi)^\s*(?:aws_)?secret(?:_access)?_key\s*=\s*["''][A-Za-z0-9/+=]{20,}["'']'
          - '(?mi)^\s*client_secret\s*=\s*["''][^"'']{12,}["'']'
        condition: or
