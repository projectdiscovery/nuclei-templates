id: gitlab-ci-latest-image

info:
  name: GitLab CI Uses latest Image Tag
  author: geeknik
  severity: medium
  description: CI jobs using mutable latest container tags can pull unexpected images.
  remediation: Pin image tags to fixed versions or immutable digests.
  reference:
    - https://docs.gitlab.com/ee/ci/yaml/
    - https://slsa.dev/spec/v1.0/levels
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:L/I:L/A:N
    cvss-score: 4.8
    cwe-id: CWE-494
  tags: file,ci,gitlab,misconfig,supply-chain

file:
  - extensions:
      - yml
      - yaml

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '(?mi)^\s*(stages|before_script|script)\s*:'

      - type: regex
        regex:
          - '(?mi)^\s*image\s*:\s*["'']?[a-z0-9._/-]+:latest["'']?\s*$'
