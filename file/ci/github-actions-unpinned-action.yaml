id: github-actions-unpinned-action

info:
  name: GitHub Actions Unpinned Action Reference
  author: geeknik
  severity: medium
  description: Actions referenced by mutable tags or branches can change unexpectedly and introduce supply-chain risk.
  remediation: Pin actions to full commit SHAs instead of branches or broad tags.
  reference:
    - https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
    - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsuses
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:L/I:H/A:N
    cvss-score: 5.9
    cwe-id: CWE-494
  tags: file,ci,github-actions,supply-chain,misconfig

file:
  - extensions:
      - yml
      - yaml

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '(?mi)^\s*(name|on|jobs)\s*:'

      - type: regex
        regex:
          - '(?mi)^\s*uses\s*:\s*[^@\s]+@(main|master|latest|v[0-9]+)\s*$'
