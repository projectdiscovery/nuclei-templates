id: dockerfile-latest-tag

info:
  name: Dockerfile Uses Mutable latest Tag
  author: geeknik
  severity: medium
  description: Dockerfile image references pinned to latest are mutable and increase supply-chain risk.
  remediation: Pin images to immutable digests or explicit version tags.
  reference:
    - https://docs.docker.com/develop/develop-images/dockerfile_best-practices/
    - https://owasp.org/www-project-devsecops-guideline/latest/02b-Cloud-Native-Security
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:L/I:L/A:N
    cvss-score: 4.8
    cwe-id: CWE-494
  tags: file,docker,dockerfile,misconfig,supply-chain

file:
  - extensions:
      - all

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '(?mi)^\s*FROM\s+'

      - type: regex
        regex:
          - '(?mi)^\s*FROM\s+[^@\s]+:latest(?:\s+AS\s+[A-Za-z0-9._-]+)?\s*$'
