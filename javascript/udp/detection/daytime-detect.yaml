id: daytime-detect

info:
  name: Daytime Service - Detect
  author: pussycat0x
  severity: info
  description: |
    Detects the Daytime service on UDP port 13 by requesting the current date and time in ASCII format as defined in RFC 867. This legacy protocol can expose system information and should be disabled to reduce attack surface.
  reference:
    - https://github.com/CiscoCXSecurity/udp-proto-scanner
    - https://www.rfc-editor.org/rfc/rfc867
  metadata:
    verified: true
    max-request: 1
    shodan-query: port:13
  tags: daytime,legacy,network,js,udp

javascript:
  - pre-condition: |
      isUDPPortOpen(Host, Port);

    code: |
      const c = require("nuclei/net");
      const payload = "313233";
      const conn = c.Open('udp', `${Host}:${Port}`);
      conn.SendHex(payload);
      let resp = conn.RecvString(256);
      conn.Close();
      resp;

    args:
      Host: "{{Host}}"
      Port: 13

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "success == true"
          - "len(response) > 10"
        condition: and

      - type: regex
        part: response
        regex:
          - "\\d{2}[:\\-]\\d{2}[:\\-]\\d{2}"
