id: ikev2-transforms-enum

info:
  name: IKEv2 Supported Transforms - Enumeration
  author: pussycat0x
  severity: info
  description: |
   Enumerates supported IKEv2 encryption cipher suites by sending individual SA_INIT probes with single-algorithm proposals. Accepted ciphers return an SA payload response, while rejected ones return a NO_PROPOSAL_CHOSEN notification.
  reference:
    - https://www.rfc-editor.org/rfc/rfc7296
    - https://www.iana.org/assignments/ikev2-parameters
    - https://www.rfc-editor.org/rfc/rfc7634
  metadata:
    verified: true
    max-request: 6
    shodan-query: "port:500 product:IKE"
    fofa-query: "port=\"500\" && protocol=\"isakmp\""
  tags: js,network,udp,ikev2,ipsec,vpn,ike

javascript:
  - pre-condition: |
      isUDPPortOpen(Host, Port);

    code: |
      let c = require("nuclei/net");


      let prf_sha256   = "0300000802000005";   // PRF-HMAC-SHA256 (always)
      let integ_sha256 = "030000080300000c";   // INTEG-HMAC-SHA256-128
      let integ_none   = "0300000803000000";   // INTEG_NONE (for AEAD)
      let dh_group14   = "000000080400000e";   // DH Group 14 (last xform)

      let ke_payload = "28000108000e0000" +
        "000102030405060708090a0b0c0d0e0f" +
        "101112131415161718191a1b1c1d1e1f" +
        "202122232425262728292a2b2c2d2e2f" +
        "303132333435363738393a3b3c3d3e3f" +
        "404142434445464748494a4b4c4d4e4f" +
        "505152535455565758595a5b5c5d5e5f" +
        "606162636465666768696a6b6c6d6e6f" +
        "707172737475767778797a7b7c7d7e7f" +
        "808182838485868788898a8b8c8d8e8f" +
        "909192939495969798999a9b9c9d9e9f" +
        "a0a1a2a3a4a5a6a7a8a9aaabacadaeaf" +
        "b0b1b2b3b4b5b6b7b8b9babbbcbdbebf" +
        "c0c1c2c3c4c5c6c7c8c9cacbcccdcecf" +
        "d0d1d2d3d4d5d6d7d8d9dadbdcdddedf" +
        "e0e1e2e3e4e5e6e7e8e9eaebecedeeef" +
        "f0f1f2f3f4f5f6f7f8f9fafbfcfdfeff";

      let nonce_payload = "00000024" +
        "4142434445464748494a4b4c4d4e4f50" +
        "5152535455565758595a414243444546";

      let suites = [
        {
          name: "AES-GCM-16ICV-256",
          iana: "ENCR_AES_GCM_16(20) KeyLen=256",
          encr: "0300000c01000014800e0100",
          integ: integ_none,
          spi: "aa01aa01aa01aa01",
          xform_bytes: 36
        },
        {
          name: "AES-GCM-16ICV-128",
          iana: "ENCR_AES_GCM_16(20) KeyLen=128",
          encr: "0300000c01000014800e0080",
          integ: integ_none,
          spi: "bb02bb02bb02bb02",
          xform_bytes: 36
        },
        {
          name: "AES-CBC-256",
          iana: "ENCR_AES_CBC(12) KeyLen=256",
          encr: "0300000c0100000c800e0100",
          integ: integ_sha256,
          spi: "cc03cc03cc03cc03",
          xform_bytes: 36
        },
        {
          name: "AES-CBC-128",
          iana: "ENCR_AES_CBC(12) KeyLen=128",
          encr: "0300000c0100000c800e0080",
          integ: integ_sha256,
          spi: "dd04dd04dd04dd04",
          xform_bytes: 36
        },
        {
          name: "3DES-CBC",
          iana: "ENCR_3DES(3)",
          encr: "0300000801000003",
          integ: integ_sha256,
          spi: "ee05ee05ee05ee05",
          xform_bytes: 32
        },
        {
          name: "CHACHA20-POLY1305",
          iana: "ENCR_CHACHA20_POLY1305(28)",
          encr: "030000080100001c",
          integ: integ_none,
          spi: "ff06ff06ff06ff06",
          xform_bytes: 32
        }
      ];

      let supported = [];
      let rejected  = [];
      let probes    = [];

      for (let i = 0; i < suites.length; i++) {
        let s = suites[i];

        let proposal_len = 8 + s.xform_bytes;
        let sa_len       = 4 + proposal_len;
        let total_len    = 28 + sa_len + 264 + 36;


        let prop_hex  = ("0000" + proposal_len.toString(16)).slice(-4);
        let sa_hex    = ("0000" + sa_len.toString(16)).slice(-4);
        let total_hex = ("00000000" + total_len.toString(16)).slice(-8);

        let packet =
          s.spi +
          "0000000000000000" +
          "21202208" +
          "00000000" +
          total_hex +
          "2200" + sa_hex +
          "0000" + prop_hex +
          "01010004" +
          s.encr +
          prf_sha256 +
          s.integ +
          dh_group14 +
          ke_payload +
          nonce_payload;

        let status = "error";
        let detail = "";
        try {
          let conn = c.Open('udp', Host + ':' + Port);
          conn.SetTimeout(8);
          conn.SendHex(packet);

          let raw = conn.Recv(2048);
          let hexBuf = bytes.NewBuffer();
          hexBuf.Write(raw);
          let resp = hexBuf.Hex();
          conn.Close();

          if (resp.length >= 56) {
            let resp_spi  = resp.substring(16, 32);
            let first_pay = parseInt(resp.substring(32, 34), 16);
            let ver_byte  = parseInt(resp.substring(34, 36), 16);
            let ike_major = (ver_byte >> 4) & 0x0f;

            if (ike_major != 2) {
              status = "error";
              detail = "non-IKEv2-response";
            } else if (first_pay == 0x21) {
              status = "accepted";
              detail = "SA-established-spi-" + resp_spi;
              supported.push(s.name);
            } else if (first_pay == 0x29) {
              if (resp.length >= 72) {
                let notify_type = parseInt(resp.substring(68, 72), 16);
                if (notify_type == 14) {
                  status = "rejected";
                  detail = "NO_PROPOSAL_CHOSEN";
                  rejected.push(s.name);
                } else if (notify_type == 17) {
                  status = "rejected";
                  detail = "INVALID_KE_PAYLOAD";
                  rejected.push(s.name);
                } else if (notify_type == 16390) {
                  status = "cookie";
                  detail = "COOKIE-challenge";
                } else {
                  status = "rejected";
                  detail = "NOTIFY_" + notify_type;
                  rejected.push(s.name);
                }
              } else {
                status = "rejected";
                detail = "Notify-truncated";
                rejected.push(s.name);
              }
            } else {
              status = "unknown";
              detail = "payload-0x" + first_pay.toString(16);
            }
          } else if (resp.length > 0) {
            status = "error";
            detail = "short-" + (resp.length / 2) + "bytes";
          } else {
            status = "error";
            detail = "no-response";
          }
        } catch(e) {
          status = "error";
          detail = "conn-error";
        }

        probes.push("PROBE:" + s.name + ":" + status + ":" + detail);
      }

      // ── Build structured text output ──
      let output = "SUPPORTED=" + (supported.length > 0 ? supported.join(",") : "none") +
        " REJECTED=" + (rejected.length > 0 ? rejected.join(",") : "none") +
        " SUPPORTED_COUNT=" + supported.length +
        " REJECTED_COUNT=" + rejected.length +
        " TOTAL_PROBES=" + suites.length +
        " FIXED_PARAMS=PRF-HMAC-SHA256+DH-Group14-MODP2048" +
        " AEAD_NOTE=AEAD-ciphers-use-INTEG_NONE" +
        " CLASSICAL_NOTE=Classical-ciphers-use-INTEG-HMAC-SHA256-128";

      for (let j = 0; j < probes.length; j++) {
        output += "\n" + probes[j];
      }

      Export(output);

    args:
      Host: "{{Host}}"
      Port: "500"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "success == true"

      - type: word
        words:
          - "PROBE:"
          - ":accepted:"
        condition: or

    extractors:
      - type: regex
        name: transforms
        regex:
          - 'PROBE:[^\n]+'
# digest: 4a0a0047304502205cfb2d48b6dd2413c49e56e1a0f65608dbb2bf7a59c952e73cc2b48e9209e4b2022100a0342ff581ee3003a706d0fca9d451d896ee0624cddd1e74edb7d0651bee9c7f:922c64590222798bb761d5b6d8e72950