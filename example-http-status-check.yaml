id: example-http-status-check

info:
  name: Example HTTP Status Check
  author: ProjectDiscoveryAI
  severity: info
  description: |
    Checks if the robots.txt file is accessible and returns a 200 OK response.
  tags: example

http:
  - method: GET
    path:
      - "{{BaseURL}}/robots.txt"

    matchers:
      - type: status
        status:
          - 200