id: robots-txt-detection

info:
  name: Robots.txt File Detection
  author: ProjectDiscoveryAI
  severity: low
  description: |
    Detects the presence of a robots.txt file and checks its HTTP status code.

http:
  - method: GET
    path:
      - "{{BaseURL}}/robots.txt"

    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "User-agent"
          - "Disallow"
        part: body