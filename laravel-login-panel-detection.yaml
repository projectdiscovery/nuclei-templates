id: laravel-login-panel-detection

info:
  name: Laravel Login Panel Detection
  author: ProjectDiscoveryAI
  severity: info
  description: |
    Detects Laravel login panels by checking for specific text in the page source and response status code.
  tags: laravel,login

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "Laravel"
          - "Email Address"
        condition: or
      - type: regex
        regex:
          - "<title>.*Login.*Laravel.*</title>"