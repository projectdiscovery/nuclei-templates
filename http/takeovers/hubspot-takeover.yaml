id: hubspot-takeover

info:
  name: hubspot takeover detection
  author: pdteam
  severity: high
  description: hubspot takeover was detected.
  reference:
    - https://github.com/EdOverflow/can-i-take-over-xyz/issues/59
    - https://hackerone.com/reports/335330
  metadata:
    max-request: 1
  tags: takeover,hubspot,hackerone,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - Host != ip

      - type: word
        words:
          - "Domain not found"
          - "does not exist in our system"
        condition: and

    extractors:
      - type: dsl
        dsl:
          - cname

  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 3

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code == 404'
          - 'contains(to_lower(header), "x-hubspot-notfound")'
          - 'contains_all(to_lower(header), "x-hs-cfworker-meta", "{\"resolver\":\"notfoundresolver\"}")'
        condition: and

    extractors:
      - type: kval
        name: hubspot-reason
        kval:
          - x_hs_reason
