id: pimcore-admin-login-panel

info:
  name: Pimcore Admin Login - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    Pimcore admin login interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Welcome to Pimcore!"
  tags: panel,login,pimcore,admin,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/admin/login"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Welcome to Pimcore!</title>"
          - "Pimcore GmbH"

      - type: status
        status:
          - 200
