id: vanna-panel

info:
  name: Vanna AI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Vanna AI is a chat interface for text-to-SQL generation using natural language. This template detects the presence of a Vanna AI chat panel.
  reference:
    - https://github.com/vanna-ai/vanna
    - https://vanna.ai
  metadata:
    verified: true
    max-request: 1
    vendor: vanna-ai
    product: vanna
    shodan-query: 'http.title:"Vanna"'
  tags: panel,vanna,ai,sql,chat,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "(?i)<title>[^<]*Vanna[^<]*</title>"

      - type: word
        part: body
        words:
          - "vanna-"

      - type: status
        status:
          - 200
