id: solaredge-monitoring-panel

info:
  name: SolarEdge Monitoring - Login Panel
  author: rxerium
  severity: info
  description: |
    SolarEdge Telematics monitoring panel has been detected.
  reference:
    - https://www.solaredge.com/
  metadata:
    max-request: 1
    verified: true
    vendor: SolarEdge
    product: solaredge-telematics
    shodan-query: 'http.title:"SolarEdge"'
  tags: panel,solaredge,ics,solar,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'SolarEdge Telematics'
          - 'SolarEdge'
        condition: or

      - type: status
        status:
          - 200
