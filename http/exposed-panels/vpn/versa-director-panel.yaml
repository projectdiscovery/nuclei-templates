id: versa-director-panel

info:
  name: Versa Director - Login Panel
  author: rxerium
  severity: info
  description: |
    Versa Director is the centralised management and orchestration platform for
    Versa Networks SD-WAN and SASE deployments. It provides VPN policy management,
    analytics, and network lifecycle automation.
  reference:
    - https://versa-networks.com/products/versa-director.php
  metadata:
    max-request: 3
    shodan-query: http.title:"Versa Director - Login"
  tags: panel,versa,sd-wan,vpn,director,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Versa Director - Login'
          - 'versa-login-logo'
          - 'Versa Networks'
        condition: or

      - type: status
        status:
          - 200
