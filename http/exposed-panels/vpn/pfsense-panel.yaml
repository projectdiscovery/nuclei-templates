id: pfsense-panel

info:
  name: pfSense - Login Panel
  author: rxerium
  severity: info
  description: |
    pfSense firewall login panel detected.
  reference:
    - https://www.pfsense.org/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"pfSense"'
  tags: panel,pfsense,firewall

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Login to pfSense'
        part: body
      - type: status
        status:
          - 200
