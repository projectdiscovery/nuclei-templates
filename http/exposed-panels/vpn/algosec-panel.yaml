id: algosec-panel

info:
  name: AlgoSec Firewall Analyzer - Login Panel
  author: rxerium
  severity: info
  description: |
    AlgoSec Firewall Analyzer is a network security policy management and firewall analysis platform used by enterprises to automate policy management, risk analysis, and compliance reporting across hybrid networks.
  reference:
    - https://www.algosec.com/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"AlgoSec"'
  tags: panel,algosec,firewall,vpn

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'AlgoSec'
        part: body

      - type: status
        status:
          - 200
