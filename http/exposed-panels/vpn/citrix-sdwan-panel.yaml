id: citrix-sdwan-panel

info:
  name: Citrix SD-WAN - Orchestrator Panel
  author: rxerium
  severity: info
  description: |
    Citrix SD-WAN Orchestrator is the centralised management platform for Citrix SD-WAN
    deployments. The web management console is commonly exposed on HTTPS port 443.
  reference:
    - https://www.citrix.com/products/citrix-sd-wan/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"Citrix SD-WAN"'
  tags: panel,citrix,sdwan,vpn,network

http:
  - method: GET
    path:
      - "{{BaseURL}}"


    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Citrix SD-WAN"
        part: body

      - type: status
        status:
          - 200
          - 302
