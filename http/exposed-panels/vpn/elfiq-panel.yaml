id: elfiq-panel

info:
  name: Elfiq Link Balancer - Login Panel
  author: rxerium
  severity: info
  description: |
    Elfiq Link Balancer management login panel detected.
  reference:
    - https://www.elfiq.com/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"Elfiq"'
  tags: panel,elfiq,loadbalancer

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Elfiq Link Balancer Management'
        part: body
      - type: status
        status:
          - 200
