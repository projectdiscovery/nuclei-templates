id: mikrotik-routeros-panel

info:
  name: Mikrotik RouterOS - Configuration Panel
  author: rxerium
  severity: info
  description: |
    Mikrotik RouterOS router configuration panel detected.
  reference:
    - https://mikrotik.com/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"RouterOS"'
  tags: panel,mikrotik,routeros,router

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'RouterOS router configuration page'
        part: body
      - type: status
        status:
          - 200
