id: draytek-vigor-panel

info:
  name: DrayTek Vigor - Login Panel
  author: rxerium
  severity: info
  description: |
    DrayTek Vigor router login panel detected.
  reference:
    - https://www.draytek.com/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"DrayTek"'
  tags: panel,draytek,vigor,router

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Vigor Login Page'

      - type: status
        status:
          - 200
