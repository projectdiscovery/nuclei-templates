id: netmotion-mobility-panel

info:
  name: NetMotion Mobility (Absolute) - Login Panel
  author: rxerium
  severity: info
  description: |
    NetMotion Mobility (now Absolute Mobility) is an enterprise mobile VPN solution
    for persistent, reliable connectivity. The web management console exposes a login
    panel on the network.
  reference:
    - https://www.absolute.com/products/netmotion-mobility/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"NetMotion Mobility"'
  tags: panel,netmotion,absolute,mobility,vpn,network

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "NetMotion Mobility"
          - "MoCo.i18nString"
        condition: or
        part: body

      - type: status
        status:
          - 200
