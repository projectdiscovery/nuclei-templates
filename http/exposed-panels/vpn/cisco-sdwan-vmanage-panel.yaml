id: cisco-sdwan-vmanage-panel

info:
  name: Cisco SD-WAN vManage - Login Panel
  author: rxerium
  severity: info
  description: |
    Cisco SD-WAN vManage is the centralised management, monitoring, and policy controller
    for Cisco SD-WAN (Viptela) deployments. The web management portal is commonly exposed
    on HTTPS port 443 or 8443.
  reference:
    - https://www.cisco.com/c/en/us/products/routers/sd-wan/index.html
  metadata:
    max-request: 1
    shodan-query: 'http.title:"SD-WAN vManage"'
  tags: panel,cisco,sdwan,vmanage,viptela,vpn,network

http:
  - method: GET
    path:
      - "{{BaseURL}}"


    matchers-condition: and
    matchers:
      - type: word
        words:
          - "SD-WAN vManage"
          - "vManage"
          - "viptela"
        condition: or
        part: body

      - type: status
        status:
          - 200
          - 302
