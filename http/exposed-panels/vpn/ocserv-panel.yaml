id: ocserv-panel

info:
  name: OpenConnect VPN Server (ocserv) - Detect
  author: rxerium
  severity: info
  description: |
    OpenConnect VPN Server (ocserv) is an open-source VPN server compatible with
    Cisco AnyConnect clients. It uses DTLS and TLS for secure connectivity and
    is commonly exposed on port 443 or 4443. The server header uniquely identifies
    the service.
  reference:
    - https://gitlab.com/openconnect/ocserv
    - https://ocserv.gitlab.io/www/
  metadata:
    max-request: 1
    shodan-query: '"Server: ocserv"'
  tags: panel,ocserv,openconnect,vpn,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - 'ocserv'
          - 'OCServer'
        condition: or

      - type: status
        status:
          - 200
          - 401
          - 302
