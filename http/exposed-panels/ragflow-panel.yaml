id: ragflow-panel

info:
  name: RAGFlow Panel - Detect
  author: rxerium
  severity: info
  description: |
    RAGFlow is an open-source RAG (Retrieval-Augmented Generation) engine based on deep
    document understanding.
  reference:
    - https://github.com/infiniflow/ragflow
    - https://ragflow.io
  metadata:
    verified: true
    max-request: 1
    vendor: infiniflow
    product: ragflow
    shodan-query: 'http.title:"RAGFlow"'
  tags: panel,ragflow,llm,ai,rag,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "RAGFlow"

      - type: status
        status:
          - 200
