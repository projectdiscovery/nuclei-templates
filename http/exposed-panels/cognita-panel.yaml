id: cognita-panel

info:
  name: Cognita Panel - Detect
  author: rxerium
  severity: info
  description: |
    Cognita is an open-source RAG framework by Truefoundry for building modular and
    production-ready RAG pipelines.
  reference:
    - https://github.com/truefoundry/cognita
    - https://truefoundry.com/cognita
  metadata:
    verified: true
    max-request: 1
    vendor: truefoundry
    product: cognita
    shodan-query: 'http.title:"Cognita"'
  tags: panel,cognita,llm,ai,rag,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Cognita"

      - type: status
        status:
          - 200
