id: trendmicro-apexone-panel

info:
  name: Trend Micro Apex One Login Panel - Detect
  author: johnk3r,s4e-io
  severity: info
  description: Trend Micro Apex One login panel was detected.
  classification:
    cwe-id: CWE-200
  metadata:
    verified: true
    max-request: 1
    shodan-query: http.title:"officescan"
  tags: panel,trendmicro,login,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/officescan/console/html/cgi/cgiChkMasterPwd.exe"
      - "{{BaseURL}}/SMB/console/html/cgi/cgiChkMasterPwd.exe"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Trend Micro"
          - "TMlogonEncrypted"
        condition: and

      - type: status
        status:
          - 200
