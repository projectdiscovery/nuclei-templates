id: ligolo-ng-panel

info:
  name: Ligolo-ng Panel - Detect
  author: Kazgangap
  severity: info
  description: |
    Ligolo-ng panel was discovered. Ligolo-ng is a simple, lightweight and fast tool that allows pentesters to establish tunnels from a reverse TCP/TLS connection using a tun interface.
  reference:
    - https://github.com/nicocha30/ligolo-ng
  metadata:
    max-request: 1
    fofa-query: icon_hash=="-39435619"
  tags: panel,login,ligolo-ng,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'contains_all(body, "<title>Ligolo-ng</title>", "Ligolo-ng WebUI")'
          - "status_code == 200"
        condition: and
