id: ligolo-ng-panel

info:
  name: Ligolo-ng Panel - Detect
  author: Kazgangap
  severity: info
  description: |
    Ligolo-ng panel was detected.
  reference:
    - https://github.com/nicocha30/ligolo-ng
  metadata:
    verified: true
    max-request: 1
    vendor: ligolo-ng
    product: ligolo-ng
    fofa-query: title="Ligolo-ng"
    shodan-query: http.title:"Ligolo-ng"
  tags: panel,ligolo-ng,login,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'contains_all(body, "<title>Ligolo-ng</title>", "Ligolo-ng WebUI")'
          - 'status_code == 200'
        condition: and
