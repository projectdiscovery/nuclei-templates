id: ctrlpanel-panel

info:
  name: CtrlPanel Login Panel - Detect
  author: theamanrawat
  severity: info
  description: CtrlPanel login panel was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
    cpe: cpe:2.3:a:ctrlpanel:ctrlpanel:*:*:*:*:*:*:*:*
  metadata:
    max-request: 1
    vendor: ctrlpanel
    product: ctrlpanel
  tags: panel,ctrlpanel,login,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>CtrlPanel</title>"

      - type: status
        status:
          - 200
