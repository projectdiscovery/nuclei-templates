id: letta-panel

info:
  name: Letta Panel - Detect
  author: rxerium
  severity: info
  description: |
    Letta (formerly MemGPT) is an open-source framework for building stateful LLM agents with long-term memory.
  reference:
    - https://github.com/letta-ai/letta
    - https://www.letta.com
  metadata:
    verified: true
    max-request: 1
    vendor: Letta AI
    product: Letta
    shodan-query: 'http.title:"Letta"'
  tags: panel,letta,memgpt,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Letta</title>"

      - type: status
        status:
          - 200
