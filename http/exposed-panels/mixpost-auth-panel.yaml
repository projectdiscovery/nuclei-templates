id: mixpost-auth-panel

info:
  name: Mixpost Auth Login - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    Mixpost authentication interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Mixpost Auth - Mixpost"
  tags: panel,login,mixpost,auth,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/mixpost/login"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_any(body, "Mixpost Auth - Mixpost","/vendor/mixpost-auth/assets/")'
        condition: and
