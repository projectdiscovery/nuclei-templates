id: botpress-panel

info:
  name: Botpress Admin Panel - Detect
  author: rxerium
  severity: info
  description: |
    Botpress admin panel was detected. Botpress is an open-source conversational AI platform for building chatbots and virtual assistants.
  reference:
    - https://github.com/botpress/botpress
    - https://botpress.com/
  metadata:
    verified: true
    max-request: 1
    vendor: botpress
    product: botpress
    shodan-query: 'http.html:"@botpress/ui-admin"'
  tags: panel,botpress,chatbot,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/admin"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '@botpress/ui-admin'
          - 'webpackJsonp'
        condition: and

      - type: status
        status:
          - 200
