id: perplexica-panel

info:
  name: Perplexica Panel - Detect
  author: rxerium
  severity: info
  description: |
    Perplexica is an open-source AI-powered search engine that uses SearXNG to search
    the web and provides AI-generated answers.
  reference:
    - https://github.com/ItzCrazyKns/Perplexica
  metadata:
    verified: true
    max-request: 1
    vendor: perplexica
    product: perplexica
    shodan-query: 'http.title:"Perplexica"'
  tags: panel,perplexica,ai,search,llm,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Perplexica"

      - type: status
        status:
          - 200
