id: digi-router-panel
info:
  name: Digi International Router - Login Panel
  author: rxerium
  severity: info
  description: 'Digi International cellular routers expose a web management interface used in industrial IoT and remote connectivity applications.

    '
  reference:
    - https://www.digi.com/products/networking/cellular-routers
  metadata:
    max-request: 1
    shodan-query: http.title:"Digi Router"
  tags: panel,ics,digi,router,industrial,discovery
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Digi"
          - "Router"
        condition: and
      - type: status
        status:
          - 200
