id: digi-router-panel

info:
  name: Digi International Router - Login Panel
  author: rxerium
  severity: info
  description: |
    Digi International cellular routers expose a web management interface used in industrial IoT and remote connectivity applications.
  reference:
    - https://www.digi.com/products/networking/cellular-routers
  metadata:
    max-request: 1
    verified: true
    vendor: Digi International
    product: digi-router
    shodan-query: 'http.title:"Digi Router"'
  tags: panel,ics,digi,router,industrial,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Digi Router</title>'
          - '__meteor_runtime_config__'
          - 'meteorRelease'
        condition: or

      - type: status
        status:
          - 200
