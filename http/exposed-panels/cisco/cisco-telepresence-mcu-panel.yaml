id: cisco-telepresence-mcu-panel

info:
  name: Cisco TelePresence MCU Login Panel - Detect
  author: dhiyaneshDk
  severity: info
  description: |
    Cisco TelePresence MCU login panel was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
    cpe: cpe:2.3:a:cisco:telepresence_mcu_software:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 1
    vendor: cisco
    product: telepresence_mcu_software
    shodan-query: http.title:"Cisco Telepresence"
  tags: panel,cisco,telepresence-mcu,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/login.html"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Cisco TelePresence MCU - login:"

      - type: status
        status:
          - 200
