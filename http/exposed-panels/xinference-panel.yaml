id: xinference-panel

info:
  name: Xinference Panel - Detect
  author: rxerium
  severity: info
  description: |
    Xinference (Xorbits Inference) is a powerful and versatile library designed to
    serve language, speech recognition, and multimodal models
  reference:
    - https://github.com/xorbitsai/inference
    - https://inference.readthedocs.io
  metadata:
    verified: true
    max-request: 1
    vendor: xorbitsai
    product: xinference
    shodan-query: 'http.title:"Xinference"'
  tags: panel,xinference,llm,ai,inference,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Xinference"

      - type: status
        status:
          - 200
