id: arcane-login-panel

info:
  name: Arcane Login Panel - Detect
  author: Kazgangap
  severity: info
  description: |
    Detects the presence of the Arcane login panel, a modern Docker management platform.
  metadata:
    max-request: 1
    verified: true
    fofa-query: icon_hash=="-313371739"
    shodan-query: http.favicon.hash:-313371739
  tags: arcane,login-panel,docker

http:
  - method: GET
    path:
      - "{{BaseURL}}/auth/login"

    matchers:
      - type: dsl
        dsl:
          - 'contains_any(tolower(body), "/arcane.png", "Sign in to Arcane", "alt=\"Arcane")'
          - 'status_code == 200'
        condition: and
