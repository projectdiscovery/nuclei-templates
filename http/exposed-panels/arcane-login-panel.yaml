id: arcane-login-panel

info:
  name: Arcane Login Panel Detection
  author: Kazgangap
  severity: info
  description: |
    Detects the presence of the Arcane login panel, a modern Docker management platform.
  metadata:
    fofa-query: icon_hash=="-313371739"
  tags: arcane,login-panel,docker

http:
  - method: GET
    path:
      - "{{BaseURL}}/auth/login"

    matchers:
      - type: dsl
        dsl:
          - 'contains_all(body, "Arcane", "Sign in")'
          - 'status_code == 200'
        condition: and
