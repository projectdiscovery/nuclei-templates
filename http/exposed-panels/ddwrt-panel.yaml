id: ddwrt-panel

info:
  name: DD-WRT - Router Panel
  author: rxerium
  severity: info
  description: |
    DD-WRT router management panel detected.
  reference:
    - https://dd-wrt.com/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"DD-WRT"'
  tags: panel,ddwrt,router

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'DD-WRT'
        part: body
      - type: status
        status:
          - 200
