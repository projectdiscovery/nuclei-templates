id: opto22-groov-panel

info:
  name: Opto 22 groov - Panel
  author: rxerium
  severity: info
  description: |
    Opto 22 groov is an IIoT and industrial automation platform providing browser-based
    HMI and edge computing capabilities. The groov View and groov Admin interfaces allow
    control of industrial devices and data acquisition systems. Exposed instances may
    provide unauthenticated access to industrial control panels.
  reference:
    - https://www.opto22.com/products/product-container/groov-epic
    - https://www.opto22.com/products/product-container/groov-rio
  metadata:
    max-request: 1
    verified: true
    vendor: Opto 22
    product: groov
    shodan-query: 'http.title:"groov"'
  tags: panel,ics,iot,opto22,groov,discovery

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Loading - groov View'
          - 'groovVersion'
          - 'groov View'
        condition: or

      - type: status
        status:
          - 200
