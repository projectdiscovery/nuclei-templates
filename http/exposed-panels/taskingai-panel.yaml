id: taskingai-panel

info:
  name: TaskingAI Panel - Detect
  author: rxerium
  severity: info
  description: |
    TaskingAI is an open-source platform for building and deploying LLM-based agents
    and AI applications with a unified API
  reference:
    - https://github.com/TaskingAI/TaskingAI
    - https://www.tasking.ai
  metadata:
    verified: true
    max-request: 1
    vendor: taskingai
    product: taskingai
    shodan-query: 'http.title:"TaskingAI | Console"'
  tags: panel,taskingai,llm,ai,agents,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "TaskingAI"

      - type: status
        status:
          - 200
