id: localgpt-panel

info:
  name: LocalGPT Panel - Detect
  author: rxerium
  severity: info
  description: |
    LocalGPT is an open-source project that allows users to chat with their documents
    locally using LLMs with no data leaving their device. This template detects exposed
    LocalGPT instances.
  reference:
    - https://github.com/PromtEngineer/localGPT
  metadata:
    verified: true
    max-request: 1
    vendor: promptengineer
    product: localgpt
    shodan-query: 'http.title:"LocalGPT"'
  tags: panel,localgpt,llm,ai,rag,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "LocalGPT"

      - type: status
        status:
          - 200
