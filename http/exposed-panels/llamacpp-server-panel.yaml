id: llamacpp-server-panel

info:
  name: llama.cpp Server Panel - Detect
  author: rxerium
  severity: info
  description: |
    llama.cpp is LLM inference in pure C/C++ with a built-in OpenAI-compatible HTTP server. This template detects exposed llama.cpp server chat interfaces.
  reference:
    - https://github.com/ggml-org/llama.cpp
  metadata:
    verified: true
    max-request: 1
    vendor: ggml
    product: llama.cpp
    shodan-query: 'http.title:"llama.cpp - chat"'
  tags: panel,llama.cpp,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>llama.cpp - chat</title>"

      - type: status
        status:
          - 200
