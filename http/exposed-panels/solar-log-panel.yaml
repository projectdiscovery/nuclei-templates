id: solar-log-panel

info:
  name: Solar-Log - Monitoring Panel
  author: rxerium
  severity: info
  description: |
    Solar-Log is a solar plant monitoring system by Solare Datensysteme GmbH (Germany)
    used for PV system monitoring, yield optimisation, and fault detection. The web
    interface is commonly exposed on port 80, 81, or non-standard ports.
  reference:
    - https://www.solar-log.com/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"Solar-Log"'
  tags: panel,solar-log,solar,energy,ics,monitoring,ot,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Solar-Log'

      - type: status
        status:
          - 200
