id: copa-data-zenon-panel

info:
  name: Copa-Data zenon - Login Panel
  author: rxerium
  severity: info
  description: |
    Copa-Data zenon is an industrial automation platform used in manufacturing, energy, and infrastructure. The zenon Web Server and Smart Server expose a browser-based HMI interface for remote monitoring and control of SCADA processes.
  reference:
    - https://www.copadata.com/en/products/zenon-software-platform/zenon-supervisor/
    - https://www.copadata.com/en/support-services/knowledge-base-documents/zenon-web-server/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"COPA-DATA :: zenon"'
  tags: panel,scada,hmi,ics,copa-data,zenon,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "COPA-DATA"
          - "zenon"
        condition: and

      - type: status
        status:
          - 200
