id: andover-continuum-panel

info:
  name: Andover Continuum BMS - Login Panel
  author: rxerium
  severity: info
  description: |
    Andover Continuum Building Management System panel has been detected.
  reference:
    - https://www.carrier.com/
  metadata:
    max-request: 1
    verified: true
    vendor: Andover
    product: andover-continuum
    shodan-query: 'http.html:"Andover Continuum"'
  tags: panel,andover,continuum,ics,bms,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Andover Continuum'

      - type: word
        part: body
        words:
          - 'Andover Continuum Embedded WebServer'

      - type: status
        status:
          - 200
