id: swarmui-panel

info:
  name: SwarmUI Panel - Detect
  author: rxerium
  severity: info
  description: |
    SwarmUI (formerly StableSwarmUI) is a modular Stable Diffusion web interface built on ASP.NET Core.
    It provides a feature-rich UI for AI image generation
  reference:
    - https://github.com/mcmonkeyprojects/SwarmUI
  metadata:
    verified: true
    max-request: 1
    vendor: mcmonkeyprojects
    product: SwarmUI
    shodan-query: 'http.title:"SwarmUI"'
  tags: panel,swarmui,stablediffusion,ai,image-generation,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/Login"

    stop-at-first-match: true
    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'version-display'
          - 'SwarmUI'
        condition: and

      - type: status
        status:
          - 200
