id: nmon-login-panel

info:
  name: nMon Panel - Detect
  author: Th3l0newolf
  severity: info
  description: |
    nMon login interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: title:"nMon"
  tags: panel,login,nmon,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/?route=signin"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>nMon</title>"

      - type: status
        status:
          - 200
