id: janitza-umg-panel

info:
  name: Janitza UMG Power Meter - Login Panel
  author: rxerium
  severity: info
  description: |
    Janitza UMG series power meters and energy analyzers expose a web interface for energy monitoring and power quality analysis.
  reference:
    - https://www.janitza.de/energy-analyzers.html
  metadata:
    max-request: 1
    verified: true
    vendor: Janitza
    product: umg
    shodan-query: 'http.title:"Janitza"'
  tags: panel,ics,janitza,power-meter,energy,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Janitza electronics'
          - 'UMG'
          - 'janitza.de'
        condition: or

      - type: status
        status:
          - 200
