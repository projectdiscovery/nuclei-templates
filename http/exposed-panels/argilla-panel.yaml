id: argilla-panel

info:
  name: Argilla Panel - Detect
  author: rxerium
  severity: info
  description: |
    Argilla is an open-source data labelling platform for AI and LLM fine-tuning workflows.
    It provides a web interface for annotating datasets used in machine learning model training.
  reference:
    - https://github.com/argilla-io/argilla
    - https://argilla.io
  metadata:
    verified: true
    max-request: 1
    vendor: Argilla
    product: Argilla
    shodan-query: 'http.title:"Argilla"'
  tags: panel,argilla,llm,ai,data-labelling,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Argilla</title>"

      - type: word
        part: body
        words:
          - "argilla.io"
          - "__NUXT__"
        condition: or

      - type: status
        status:
          - 200
