id: marimo-panel

info:
  name: Marimo Panel - Detect
  author: rxerium
  severity: info
  description: |
    Marimo is an open-source reactive Python notebook and app framework that replaces Jupyter
    with git-friendly, reproducible notebooks.
  reference:
    - https://github.com/marimo-team/marimo
    - https://marimo.io
  metadata:
    verified: true
    max-request: 1
    vendor: marimo-team
    product: marimo
    shodan-query: 'http.title:"marimo"'
  tags: panel,marimo,notebook,python,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'data-marimo="true"'
          - "marimo-version"
        condition: and

      - type: status
        status:
          - 200
