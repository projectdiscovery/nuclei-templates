id: emoncms-panel

info:
  name: OpenEnergyMonitor emonCMS - Login Panel
  author: rxerium
  severity: info
  description: |
    emonCMS is an open-source energy monitoring web application by OpenEnergyMonitor,
    used in homes and small businesses to track electricity, gas, and temperature.
    The login page is commonly exposed on port 80, 443, or 8010.
  reference:
    - https://emoncms.org/
    - https://github.com/emoncms/emoncms
  metadata:
    max-request: 1
    verified: true
    vendor: OpenEnergyMonitor
    product: emoncms
    shodan-query: 'http.title:"Emoncms - user login"'
  tags: panel,emoncms,energy,iot,ics,monitoring,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Emoncms - user login'

      - type: word
        part: header
        words:
          - 'EMONCMS_SESSID'

      - type: status
        status:
          - 200