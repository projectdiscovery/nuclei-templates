id: ibm-webmethods-panel

info:
  name: IBM webMethods Integration Login Panel - Detect
  author: infosec.asish
  severity: info
  description: |
    Identified an exposed IBM or Software AG webMethods login panel
  reference:
    - https://www.ibm.com/products/webmethods-hybrid-integration
  metadata:
    verified: true
    max-request: 1
    shodan-query: http.html:"IBM webMethods Integration"
  tags: tech,panel,ibm,webmethods,recon

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/wmroot/"
      - "{{BaseURL}}/integration/"

    redirects: true
    max-redirects: 5
    stop-at-first-match: true


    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "contains(body, '<title>IBM webMethods Integration')"
        condition: and
