id: morningstar-prostar-mppt-detect

info:
  name: Morningstar ProStar MPPT Solar Charge Controller - Detect
  author: rxerium
  severity: info
  description: |
    Morningstar ProStar MPPT is a solar charge controller with a built-in web server providing live data monitoring for off-grid and industrial solar installations. The exposed interface displays real-time array, battery, and load data without authentication.
  reference:
    - https://www.morningstarcorp.com/products/prostar-mppt/
  metadata:
    max-request: 1
    shodan-query: http.title:"Prostar MPPT - Live Data"
    vendor: morningstar
    product: prostar-mppt
  tags: tech,panel,morningstar,ics,solar,energy,scada,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Prostar MPPT - Live Data</title>'
          - 'ProstarMPPTLive'
        part: body
        condition: and

      - type: status
        status:
          - 200
