id: couchbase-server-console

info:
  name: Couchbase Server Console - Detect
  author: Th3l0newolf
  severity: info
  description: |
    Couchbase Server administrative console was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Couchbase Console"
  tags: panel,login,couchbase,console,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/ui/index.html"

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "Couchbase Console</title>"
          - "/opt/couchbase/lib/"
          - "content=\"Couchbase Server"
        condition: or

      - type: word
        part: server
        words:
          - "Couchbase Server"
