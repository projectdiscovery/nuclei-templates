id: stackstorm-web-ui-panel

info:
  name: StackStorm Web UI - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    StackStorm Web UI interface was discovered.
  reference:
    - https://stackstorm.com/
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"StackStorm Web UI"
    vendor: stackstorm
    product: stackstorm
  tags: panel,stackstorm,webui,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(to_lower(body), "<title>stackstorm web ui")'
        condition: and
