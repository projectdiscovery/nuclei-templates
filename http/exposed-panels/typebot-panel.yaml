id: typebot-panel

info:
  name: Typebot Panel - Detect
  author: rxerium
  severity: info
  description: |
    Typebot is an open-source chatbot builder that allows you to create advanced
    chatbots visually.
  reference:
    - https://github.com/baptisteArno/typebot.io
    - https://typebot.io
  metadata:
    verified: true
    max-request: 1
    vendor: typebot
    product: typebot
    shodan-query: 'http.title:"Typebot"'
  tags: panel,typebot,chatbot,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "typebot"
        case-insensitive: true

      - type: status
        status:
          - 200
