id: sonar-poller-login

info:
  name: Sonar Poller Login Panel Detection
  author: Th3l0newolf
  severity: info
  description: Detects exposed Sonar Poller login/interface panels from Sonar Software.
  tags: sonar,poller,login,panel,exposure
  metadata:
    verified: true

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - "<title>\\s*Sonar Poller\\s*</title>"

      - type: word
        part: body
        words:
          - '<label for="sonarUrl" class="sr-only">Sonar Instance URL</label>'
          - '<div class="input-group-text">.sonar.software</div>'
