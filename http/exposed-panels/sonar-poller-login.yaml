id: sonar-poller-login

info:
  name: Sonar Poller Login Panel - Detect
  author: Th3l0newolf
  severity: info
  description: Sonar Poller login/interface was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
  tags: panel,login,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - '<title>Sonar Poller'
          - '<label for="sonarUrl" class="sr-only">Sonar Instance URL</label>'
