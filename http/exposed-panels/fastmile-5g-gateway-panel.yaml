id: fastmile-5g-gateway-panel

info:
  name: FastMile 5G Gateway Panel - Detect
  author: Th3l0newolf
  severity: info
  description: |
    FastMile 5G Gateway web interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 2
    verified: true
    shodan-query: html:"FastMile 5G Gateway"
  tags: panel,login,router,5g,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/web_whw/"
      - "{{BaseURL}}/web_whw/overview"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>FastMile 5G Gateway</title>"

      - type: status
        status:
          - 200
