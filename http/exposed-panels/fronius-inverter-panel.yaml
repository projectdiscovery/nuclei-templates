id: fronius-inverter-panel

info:
  name: Fronius Inverter - Login Panel
  author: rxerium
  severity: info
  description: |
    Fronius Inverter is the web interface for Fronius GEN24 and Symo series solar inverters, providing real-time monitoring, configuration, and energy management for photovoltaic systems.
  reference:
    - https://www.fronius.com/en/solar-energy/private-customers/products-solutions/solar-inverters
  metadata:
    max-request: 1
    verified: true
    vendor: Fronius
    product: fronius-inverter
    shodan-query: 'http.title:"Fronius Inverter"'
  tags: panel,fronius,ics,scada,solar,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Fronius Inverter</title>'
          - 'Fronius'
          - 'inverter'
        condition: or

      - type: status
        status:
          - 200
