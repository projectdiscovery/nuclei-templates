id: skyvern-panel

info:
  name: Skyvern Panel - Detect
  author: rxerium
  severity: info
  description: |
    Skyvern is an open-source AI agent that automates browser-based workflows using
    LLMs and computer vision
  reference:
    - https://github.com/Skyvern-AI/skyvern
    - https://skyvern.com
  metadata:
    verified: true
    max-request: 1
    vendor: skyvern-ai
    product: skyvern
    shodan-query: 'http.title:"Skyvern"'
  tags: panel,skyvern,llm,ai,agents,automation,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Skyvern"

      - type: status
        status:
          - 200
