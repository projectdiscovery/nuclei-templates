id: unitronics-plc-panel

info:
  name: Unitronics PLC - Login Panel
  author: rxerium
  severity: info
  description: |
    Unitronics PLC web interface panel has been detected.
  reference:
    - https://www.unitronicsplc.com/
  metadata:
    max-request: 1
    verified: true
    vendor: Unitronics
    product: plc
    shodan-query: 'http.html:"Unitronics"'
  tags: panel,unitronics,plc,ics,discovery

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Unitronics</title>'
          - 'Logo-Unitronics.svg'
          - 'unitronics.com'
        condition: or

      - type: status
        status:
          - 200