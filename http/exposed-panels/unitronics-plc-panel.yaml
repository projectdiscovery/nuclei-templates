id: unitronics-plc-panel
info:
  name: Unitronics PLC - Login Panel
  author: rxerium
  severity: info
  description: 'Unitronics PLC web interface panel has been detected.

    '
  reference:
    - https://www.unitronicsplc.com/
  metadata:
    max-request: 1
    shodan-query: http.html:"Unitronics"
  tags: panel,unitronics,plc,ics,discovery
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Logo-Unitronics.svg"
          - "<title>Unitronics</title>"
        condition: and
      - type: status
        status:
          - 200
