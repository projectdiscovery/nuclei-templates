id: openllm-panel

info:
  name: OpenLLM Panel - Detect
  author: rxerium
  severity: info
  description: |
    OpenLLM is an open-source platform for running and deploying LLMs in production. It is built by BentoML
    and provides an OpenAI-compatible API server with a web UI for model management.
  reference:
    - https://github.com/bentoml/OpenLLM
    - https://bentoml.com
  metadata:
    verified: true
    max-request: 1
    vendor: BentoML
    product: OpenLLM
    shodan-query: 'http.title:"OpenLLM"'
  tags: panel,openllm,bentoml,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '(?i)<title>[^<]*OpenLLM[^<]*</title>'

      - type: status
        status:
          - 200
