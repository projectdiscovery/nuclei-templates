id: typesense-search-server

info:
  name: Typesense Search Server - Detect
  author: ChrisJr404
  severity: info
  description: |
    Detected Typesense was an open-source typo-tolerant search engine often self-hosted on TCP 8108.
  reference:
    - https://github.com/typesense/typesense
    - https://typesense.org/docs/latest/api/
  metadata:
    verified: true
    max-request: 1
    vendor: typesense
    product: typesense
    shodan-query: '"x-typesense"'
    fofa-query: header="x-typesense"
  tags: tech,typesense,search,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/health"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(body, "\"ok\":true")'
          - 'contains(to_lower(header), "x-typesense")'
          - 'contains(content_type, "application/json")'
        condition: and
