id: schneider-tac-vista-panel

info:
  name: Schneider TAC Vista - Login Panel
  author: rxerium
  severity: info
  description: |
    Schneider TAC Vista building automation panel has been detected.
  reference:
    - https://www.se.com/
  metadata:
    max-request: 2
    shodan-query: 'http.title:"TAC Vista"'
  tags: panel,schneider,tac,vista,ics,bms,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/webstation/"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Webstation"
          - "TAC Vista"
        condition: and

      - type: status
        status:
          - 200
