id: wandb-panel

info:
  name: Weights & Biases Panel - Detect
  author: rxerium
  severity: info
  description: |
    Weights & Biases (wandb) panel was detected. W&B is a machine learning platform for experiment tracking, dataset versioning, and model management.
  reference:
    - https://github.com/wandb/wandb
    - https://wandb.ai
  metadata:
    verified: true
    max-request: 1
    vendor: weights-and-biases
    product: wandb
    shodan-query: 'http.title:"Weights & Biases" OR http.title:"Weights &amp; Biases"'
  tags: panel,wandb,weights-biases,ai,ml,mlops,experiment-tracking,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '(?i)<title>[^<]*Weights\s*&(?:amp;)?\s*Biases[^<]*</title>'

      - type: status
        status:
          - 200
