id: deep-sea-electronics-dse855-detect

info:
  name: Deep Sea Electronics DSE 855 Generator Controller - Detect
  author: rxerium
  severity: info
  description: |
    Deep Sea Electronics DSE 855 is a generator/mains automatic transfer switch (ATS) controller
    with a built-in HTTP web server for remote monitoring and configuration of generator control systems.
    The interface is commonly exposed on port 8090 and requires no authentication by default.
  reference:
    - https://www.deepseaelectronics.com/products/auto-mains-failure-modules/855.html
  metadata:
    max-request: 1
    shodan-query: http.title:"DSE 855"
    vendor: deep-sea-electronics
    product: dse855
  tags: tech,panel,dse,ics,generator,energy,scada,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>DSE 855</title>'
        part: body

      - type: word
        words:
          - 'tab-view.css'
          - 'gui.css'
        part: body
        condition: and

      - type: status
        status:
          - 200
