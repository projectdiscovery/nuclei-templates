id: kargo-login

info:
  name: Kargo Login Panel - Detect
  author: theamanrawat
  severity: info
  description: Kargo login panel was detected.
  reference:
    - https://github.com/akuity/kargo
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    vendor: akuity
    product: kargo
    shodan-query: http.title:"Kargo"
  tags: kargo,panel,login,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>Kargo</title>"

      - type: status
        status:
          - 200
