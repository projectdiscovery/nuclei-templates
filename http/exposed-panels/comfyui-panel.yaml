id: comfyui-panel

info:
  name: ComfyUI Panel - Detect
  author: rxerium
  severity: info
  description: |
    ComfyUI is a powerful and modular stable diffusion GUI and backend with a graph/nodes
    based interface. This template detects exposed ComfyUI instances.
  reference:
    - https://github.com/Comfy-Org/ComfyUI
    - https://www.comfy.org
  metadata:
    verified: true
    max-request: 1
    vendor: comfy-org
    product: comfyui
    shodan-query: 'http.title:"ComfyUI"'
  tags: panel,comfyui,stable-diffusion,ai,image-generation,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>ComfyUI</title>"

      - type: status
        status:
          - 200
