id: cogent-datahub-panel

info:
  name: Cogent DataHub (OPC DataHub) - Panel
  author: rxerium
  severity: info
  description: |
    Cogent DataHub (OPC DataHub) is an industrial middleware platform for OPC connectivity, data bridging, and SCADA integration. The embedded web server is commonly exposed on port 80 or 443.
  reference:
    - https://www.cogentdatahub.com/products/datahub/
    - https://www.opcdatahub.com/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"DataHub Web Server"'
  tags: panel,cogent,datahub,opc,scada,ics,ot,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "DataHub Web Server"
          - "dhwebserver.css"
        condition: and

      - type: status
        status:
          - 200
