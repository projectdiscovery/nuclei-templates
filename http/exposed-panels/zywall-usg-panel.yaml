id: zywall-usg-panel

info:
  name: ZyXEL ZyWALL USG - Login Panel
  author: rxerium
  severity: info
  description: |
    ZyXEL ZyWALL USG firewall login panel detected.
  reference:
    - https://www.zyxel.com/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"ZyWALL"'
  tags: panel,zyxel,zywall,firewall

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'ZyWALL USG'

      - type: status
        status:
          - 200
