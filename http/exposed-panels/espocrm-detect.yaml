id: espocrm-detect

info:
  name: EspoCRM - Detect
  author: theamanrawat
  severity: info
  description: EspoCRM panel was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    verified: true
    max-request: 1
    vendor: espocrm
    product: espocrm
    shodan-query: html:"Powered by EspoCRM"
    fofa-query: body="Powered by EspoCRM"
  tags: panel,espocrm,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'title="Powered by EspoCRM"'

      - type: status
        status:
          - 200
