id: ge-proficy-webspace-panel

info:
  name: GE Proficy WebSpace - Login Panel
  author: rxerium
  severity: info
  description: |
    GE Proficy WebSpace is a thin-client delivery platform for GE Proficy
    HMI/SCADA (iFIX, CIMPLICITY) applications over the web. It exposes
    industrial HMI screens via browser on TCP/491 by default. The Server
    header "WebSocket++/0.7.0" is a unique indicator.
  reference:
    - https://www.ge.com/digital/applications/hmi-scada/proficy-webspace
  metadata:
    max-request: 1
    verified: true
    vendor: GE
    product: proficy-webspace
    shodan-query: 'http.title:"Proficy WebSpace"'
  tags: panel,scada,hmi,ics,ge,proficy,webspace,ifix,cimplicity,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Proficy WebSpace'
          - 'BRAND_NAME_PRODUCT'
          - 'brand.js'
        condition: or

      - type: status
        status:
          - 200
