id: ge-proficy-webspace-panel

info:
  name: GE Proficy WebSpace - Login Panel
  author: rxerium
  severity: info
  description: |
    GE Proficy WebSpace is a thin-client delivery platform for GE Proficy HMI/SCADA (iFIX, CIMPLICITY) applications over the web. It exposes industrial HMI screens via browser on TCP/491 by default. The Server header "WebSocket++/0.7.0" is a unique indicator.
  reference:
    - https://www.ge.com/digital/applications/hmi-scada/proficy-webspace
  metadata:
    max-request: 1
    shodan-query: 'http.title:"Proficy WebSpace"'
  tags: panel,scada,hmi,ics,ge,proficy,webspace,ifix,cimplicity,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Proficy"
          - "WebSpace"
        condition: and

      - type: status
        status:
          - 200
