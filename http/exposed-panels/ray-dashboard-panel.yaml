id: ray-dashboard-panel

info:
  name: Ray Dashboard Panel - Detect
  author: rxerium
  severity: info
  description: |
    Ray is an open-source AI and Python framework for scaling ML workloads.
    The Ray Dashboard provides a web interface for monitoring cluster resources, jobs, and actor status.
    This template detects exposed Ray Dashboard instances.
  reference:
    - https://github.com/ray-project/ray
    - https://ray.io
  metadata:
    verified: true
    max-request: 1
    vendor: Anyscale
    product: Ray Dashboard
    shodan-query: 'http.title:"Ray Dashboard"'
  tags: panel,ray,anyscale,mlops,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Ray Dashboard</title>"

      - type: status
        status:
          - 200
