id: tensorboard-panel

info:
  name: TensorBoard Panel - Detect
  author: rxerium
  severity: info
  description: |
    TensorBoard is TensorFlow's visualization toolkit for machine learning experimentation
  reference:
    - https://github.com/tensorflow/tensorboard
    - https://www.tensorflow.org/tensorboard
  metadata:
    verified: true
    max-request: 1
    vendor: tensorflow
    product: tensorboard
    shodan-query: 'http.title:"TensorBoard"'
  tags: panel,tensorboard,tensorflow,ml,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '(?i)<title>[^<]*TensorBoard[^<]*</title>'

      - type: status
        status:
          - 200
