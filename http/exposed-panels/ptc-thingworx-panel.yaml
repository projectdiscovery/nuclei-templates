id: ptc-thingworx-panel

info:
  name: PTC ThingWorx - Panel
  author: rxerium
  severity: info
  description: |
    PTC ThingWorx is an Industrial IoT (IIoT) platform for building and deploying connected industrial applications, machine monitoring, and remote service solutions. Exposed instances may provide unauthenticated access to IIoT dashboards and connected device management interfaces.
  reference:
    - https://www.ptc.com/en/products/thingworx
  metadata:
    max-request: 1
    shodan-query: 'http.title:"Thingworx"'
  tags: panel,ics,iot,ptc,thingworx,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Thingworx'

      - type: status
        status:
          - 200
