id: scadabr-panel
info:
  name: ScadaBR - Login Panel
  author: rxerium
  severity: info
  description: 'ScadaBR is an open-source SCADA system based on Mango Automation, widely used in Brazil and Latin America for industrial monitoring. The "powered by Mango" tagline in the title is a unique identifier. Instances are often internet-facing without authentication controls.

    '
  reference:
    - https://www.scadabr.com.br/
    - https://github.com/ScadaBR/ScadaBR
  metadata:
    max-request: 1
    shodan-query: http.title:"ScadaBR"
  tags: panel,scada,ics,scadabr,mango,open-source,latin-america,discovery
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "ScadaBR Software"
          - "<title>ScadaBR</title>"
        condition: and
      - type: status
        status:
          - 200
