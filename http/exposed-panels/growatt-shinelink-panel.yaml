id: growatt-shinelink-panel

info:
  name: Growatt Shinelink - Login Panel
  author: rxerium
  severity: info
  description: |
    Growatt Shinelink is a web-based data logger and monitoring interface for Growatt solar inverters, providing real-time solar energy production data and system configuration.
  reference:
    - https://www.ginverter.com/en/product/monitor/shinelink-x.html
  metadata:
    max-request: 1
    verified: true
    vendor: Growatt
    product: shinelink
    shodan-query: 'http.title:"Growatt Shinelink"'
  tags: panel,growatt,ics,scada,solar,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Growatt Shinelink'
          - 'datalogsta'
          - 'treeapp.htm'
        condition: or

      - type: status
        status:
          - 200
