id: janitza-gridvis-detect
info:
  name: Janitza GridVis Energy Management - Detect
  author: rxerium
  severity: info
  description: 'Janitza GridVis is an energy monitoring and management software platform by Janitza Electronics GmbH. It provides real-time power quality analysis, energy data logging, and grid visualisation for industrial facilities.

    '
  reference:
    - https://www.janitza.com/gridvis.html
  metadata:
    max-request: 1
    shodan-query: http.title:"GridVis"
    vendor: janitza
    product: gridvis
  tags: tech,panel,janitza,ics,energy,scada,detect
http:
  - method: GET
    path:
      - '{{BaseURL}}/landingpage'
      - '{{BaseURL}}/landingpage/'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "GridVis"
          - "/landingpage/img/favicon.ico"
        part: body
        condition: and
      - type: word
        words:
          - "/landingpage/img/favicon.ico"
          - "gve-8janitza.energy.security"
        part: body
        condition: or
      - type: status
        status:
          - 200
