id: reliable-controls-panel

info:
  name: Reliable Controls MACH-Pro - Login Panel
  author: rxerium
  severity: info
  description: |
    Reliable Controls MACH-ProWebSys is a web-based building controller for
    HVAC, lighting, and energy management using BACnet/IP. These controllers
    are widely deployed in commercial buildings across North America and are
    often directly internet-facing with no VPN protection.
  reference:
    - https://reliablecontrols.com/products/mach-prowebsys/
  metadata:
    max-request: 1
    verified: true
    vendor: Reliable Controls
    product: mach-system
    shodan-query: http.title:"Reliable Controls"
  tags: panel,ics,bms,bacnet,building-automation,reliable-controls,mach-pro,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Reliable Controls'
          - 'Reliable Controls Embedded Web Server'
          - 'mpw-sw'
        condition: or

      - type: status
        status:
          - 200
