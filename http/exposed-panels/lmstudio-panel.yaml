id: lmstudio-panel

info:
  name: LM Studio Panel - Detect
  author: rxerium
  severity: info
  description: |
    LM Studio is a desktop application for discovering, downloading, and running local
    LLMs. This template detects exposed LM Studio server or chat interface instances.
  reference:
    - https://lmstudio.ai
  metadata:
    verified: true
    max-request: 1
    vendor: lmstudio
    product: lmstudio
    shodan-query: 'http.title:"LM Studio Chat"'
  tags: panel,lmstudio,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "LM Studio"

      - type: status
        status:
          - 200
