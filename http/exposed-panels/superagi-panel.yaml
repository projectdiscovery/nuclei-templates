id: superagi-panel

info:
  name: SuperAGI Panel - Detect
  author: rxerium
  severity: info
  description: |
   SuperAGI panel was detected. SuperAGI was an open-source autonomous AI agent platform that enables building, managing, and running AI agents. Exposed instances may allow unauthorized access to agent configurations and execution environments.
  reference:
    - https://github.com/TransformerOptimus/SuperAGI
    - https://superagi.com/
  metadata:
    verified: true
    max-request: 1
    vendor: TransformerOptimus
    product: superagi
    shodan-query: 'http.favicon.hash:-2056571568'
    fofa-query: 'icon_hash="-2056571568"'
  tags: panel,superagi,ai,agent,detect,discovery

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - contains(body, "<title>SuperAGI</title>")
          - status_code == 200 || status_code == 404
        condition: and
