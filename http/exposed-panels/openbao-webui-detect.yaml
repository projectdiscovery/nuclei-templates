id: openbao-webui-detect

info:
  name: OpenBao Web UI Panel - Detect
  author: ritikchaddha
  severity: info
  description: |
    Detects the presence of the OpenBao web console.
  reference:
    - https://github.com/openbao/openbao
  metadata:
    verified: true
    max-request: 1
    shodan-query: http.title:"OpenBao"
    fofa-query: title="OpenBao"
  tags: panel,openbao,detect,ui

http:
  - method: GET
    path:
      - "{{BaseURL}}/ui"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>OpenBao"
          - "Welcome to OpenBao"
        condition: or

      - type: status
        status:
          - 200
