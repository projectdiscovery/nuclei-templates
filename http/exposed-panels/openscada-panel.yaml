id: openscada-panel

info:
  name: OpenSCADA - Panel
  author: rxerium
  severity: info
  description: |
    OpenSCADA is an open-source SCADA (Supervisory Control and Data Acquisition) system. Exposed instances may provide access to industrial control interfaces and operational technology (OT) data without authentication.
  reference:
    - https://oscada.org
    - https://sourceforge.net/projects/oscada/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"OpenSCADA" port:10002'
  tags: panel,ics,scada,openscada,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'OpenSCADA'

      - type: status
        status:
          - 200
