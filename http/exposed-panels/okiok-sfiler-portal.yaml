id: okiok-sfiler-portal

info:
  name: OKIOK S-Filer Portal Login Panel - Detect
  author: johnk3r
  severity: info
  description: OKIOK S-Filer Portal login panel was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    shodan-query: http.title:"S-Filer"
  tags: okiok,panel,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/sfiler/Login.action"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>S-Filer Portal - Login</title>"
        part: body

      - type: status
        status:
          - 200

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '<br\/>S\-Filer\/([A-Za-z 0-9.]+)<\/p>'
