id: big-agi-panel

info:
  name: big-AGI Panel - Detect
  author: rxerium
  severity: info
  description: |
    big-AGI is a generative AI suite for power users, teams, and developers. It provides
    an AI chat interface with support for multiple LLM providers
  reference:
    - https://github.com/enricoros/big-AGI
    - https://big-agi.com
  metadata:
    verified: true
    max-request: 1
    vendor: big-agi
    product: big-agi
    shodan-query: 'http.title:"big-AGI"'
  tags: panel,big-agi,llm,ai,chat,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "big-AGI"
        case-insensitive: true

      - type: status
        status:
          - 200
