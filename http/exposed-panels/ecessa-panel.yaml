id: ecessa-panel

info:
  name: Ecessa WANworX - Login Panel
  author: rxerium
  severity: info
  description: |
    Ecessa WANworX management panel detected.
  reference:
    - https://www.ecessa.com/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"Ecessa"'
  tags: panel,ecessa,sdwan,wanworx

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'webmaster@ecessa.com'

      - type: status
        status:
          - 200
