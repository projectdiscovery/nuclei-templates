id: praisonai-panel

info:
  name: PraisonAI Panel - Detect
  author: rxerium
  severity: info
  description: |
    PraisonAI is a multi-agent AI framework with a self-hosted API and UI.
    This template detects exposed PraisonAI API server instances.
  reference:
    - https://github.com/MervinPraison/PraisonAI
    - https://docs.praison.ai
  metadata:
    verified: true
    max-request: 1
    vendor: MervinPraison
    product: PraisonAI
    shodan-query: 'http.html:"praisonai"'
  tags: panel,praisonai,ai,llm,agent,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "praisonai"

      - type: status
        status:
          - 200
