id: fronius-datalogger-web-panel

info:
  name: Fronius Datalogger Web - Login Panel
  author: rxerium
  severity: info
  description: |
    Fronius Datalogger Web is a web interface for Fronius solar inverter data loggers, providing real-time monitoring and configuration of photovoltaic systems.
  reference:
    - https://www.fronius.com/en/solar-energy/installers-partners/technical-data/all-products/system-monitoring/hardware/fronius-datamanager-2-0
  metadata:
    max-request: 1
    shodan-query: 'http.title:"Fronius Datalogger Web"'
  tags: panel,fronius,ics,scada,solar,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Fronius Datalogger Web'

      - type: status
        status:
          - 200
