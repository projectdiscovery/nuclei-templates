id: chatbot-ui-panel

info:
  name: Chatbot UI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Chatbot UI is an open-source AI chat app
  reference:
    - https://github.com/mckaywrigley/chatbot-ui
  metadata:
    verified: true
    max-request: 1
    vendor: mckaywrigley
    product: chatbot-ui
    shodan-query: 'http.title:"Chatbot UI"'
  tags: panel,chatbot-ui,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Chatbot UI</title>"

      - type: status
        status:
          - 200
