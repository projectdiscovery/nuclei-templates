id: microsys-promotic-panel
info:
  name: Microsys Promotic SCADA - Login Panel
  author: rxerium
  severity: info
  description: 'Microsys Promotic is a SCADA/HMI software platform widely deployed in central European industrial and building automation applications. The embedded web server exposes a runtime panel accessible over HTTP on non-standard ports.

    '
  reference:
    - https://www.microsys.cz/en/products/promotic/
  metadata:
    max-request: 1
    shodan-query: http.title:"PROMOTIC"
  tags: panel,microsys,promotic,scada,ics,ot,discovery
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>PROMOTIC Redirection</title>"
        condition: and
      - type: word
        part: header
        words:
          - "Server: Promotic"
        condition: and
      - type: status
        status:
          - 200
