id: kubeflow-pipelines-panel

info:
  name: Kubeflow Pipelines Panel - Detect
  author: rxerium
  severity: info
  description: |
    Kubeflow Pipelines is an open-source platform for building and deploying portable, scalable ML workflows.
    It provides a web UI for managing ML pipelines, experiments, and runs on Kubernetes.
  reference:
    - https://github.com/kubeflow/pipelines
    - https://www.kubeflow.org
  metadata:
    verified: true
    max-request: 1
    vendor: Kubeflow
    product: Kubeflow Pipelines
    shodan-query: 'http.title:"Kubeflow Pipelines"'
  tags: panel,kubeflow,kubernetes,mlops,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Kubeflow Pipelines</title>"

      - type: word
        part: body
        words:
          - "window.KFP_FLAGS"
          - "KFP_FLAGS"
        condition: or

      - type: status
        status:
          - 200
