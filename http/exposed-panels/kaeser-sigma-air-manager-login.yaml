id: kaeser-sigma-air-manager-login

info:
  name: KAESER CONNECT – SIGMA AIR MANAGER 4.0 Login Panel
  author: Th3l0newolf
  severity: info
  description: Detects exposed KAESER CONNECT – SIGMA AIR MANAGER 4.0 HMI login interface.
  reference:
    - https://www.kaeser.com/
  tags: kaeser,sigma-air-manager,hmi,ics,scada,industrial,login
  metadata:
    verified: true

http:
  - method: GET
    path:
      - "{{BaseURL}}/HMI/login.html"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - "<title>\\s*SIGMA AIR MANAGER 4\\.0 HMI login\\s*</title>"

      - type: regex
        part: body
        regex:
          - "<h2>\\s*KAESER CONNECT – SIGMA AIR MANAGER 4\\.0\\s*</h2>"
