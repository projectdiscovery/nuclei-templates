id: fuxa-scada-panel

info:
  name: FUXA - SCADA/HMI Panel
  author: rxerium
  severity: info
  description: |
    FUXA is an open-source web-based SCADA/HMI platform built on Node.js. It supports Modbus, OPC-UA, BACnet, MQTT, and Siemens S7 protocols and is widely self-hosted for small industrial deployments. Instances are frequently exposed to the internet without authentication.
  reference:
    - https://github.com/frangoteam/FUXA
  metadata:
    max-request: 1
    shodan-query: http.title:"FUXA"
  tags: panel,scada,hmi,ics,fuxa,open-source,nodejs,modbus,opc-ua,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'FUXA'

      - type: status
        status:
          - 200
