id: fuxa-scada-panel

info:
  name: FUXA - SCADA/HMI Panel
  author: rxerium
  severity: info
  description: |
    FUXA is an open-source web-based SCADA/HMI platform built on Node.js.
    It supports Modbus, OPC-UA, BACnet, MQTT, and Siemens S7 protocols and
    is widely self-hosted for small industrial deployments. Instances are
    frequently exposed to the internet without authentication.
  reference:
    - https://github.com/frangoteam/FUXA
  metadata:
    max-request: 1
    verified: true
    vendor: frangoteam
    product: fuxa
    shodan-query: http.title:"FUXA"
  tags: panel,scada,hmi,ics,fuxa,open-source,nodejs,modbus,opc-ua,discovery

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>FUXA</title>'
          - 'assets/lib/svgeditor'
          - 'FUXA'
        condition: or

      - type: status
        status:
          - 200
