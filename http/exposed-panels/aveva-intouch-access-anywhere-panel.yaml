id: aveva-intouch-access-anywhere-panel

info:
  name: AVEVA InTouch Access Anywhere - Panel
  author: rxerium
  severity: info
  description: |
    AVEVA InTouch Access Anywhere is a secure gateway that provides browser-based remote access to InTouch HMI applications over the internet. It is widely used in industrial process control, utilities, and manufacturing environments. Exposed instances may provide access to industrial HMI displays and SCADA interfaces.
  reference:
    - https://www.aveva.com/en/products/intouch-hmi/
    - https://www.aveva.com/en/products/intouch-access-anywhere/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"InTouch Access Anywhere"'
  tags: panel,ics,scada,aveva,intouch,hmi,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    redirects: true

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "InTouch"
          - "Access Anywhere"
        condition: and

      - type: status
        status:
          - 200
