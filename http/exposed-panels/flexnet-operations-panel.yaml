id: flexnet-operations-panel

info:
  name: FlexNet Operations Panel - Detect
  author: righettod,s4e-io
  severity: info
  description: |
     FlexNet Operations was detected — a software monetization platform.
  reference:
    - https://resources.flexera.com/web/media/documents/Datasheet-FNO-Overview.pdf
    - https://www.flexera.com
  metadata:
    verified: true
    max-request: 1
    vendor: flexera
    product: flexnet_operations
    shodan-query: http.title:"FlexNet Login"
    fofa-query: title="FlexNet Login"
    google-query: intitle:"FlexNet Login"
  tags: panel,flexnet,login,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/flexnet/logon.do"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(to_lower(body), "flexnet login")'
        condition: and

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - 'ver=([0-9_.]+)'