id: chainlit-panel

info:
  name: Chainlit Panel - Detect
  author: rxerium
  severity: info
  description: |
    Chainlit panel was detected. Chainlit is an open-source framework for building production-ready conversational AI applications.
  reference:
    - https://github.com/Chainlit/chainlit
    - https://chainlit.io/
  metadata:
    verified: true
    max-request: 1
    vendor: chainlit
    product: chainlit
    shodan-query: 'http.html:"chainlit"'
  tags: panel,chainlit,llm,ai,chatbot,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'chainlit'
          - 'Assistant'
        condition: and

      - type: word
        part: body
        words:
          - 'og:url" content="https://github.com/Chainlit/chainlit'

      - type: status
        status:
          - 200
