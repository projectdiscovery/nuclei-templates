id: kaco-new-energy-detect

info:
  name: KACO New Energy Solar Inverter - Detect
  author: rxerium
  severity: info
  description: |
    KACO new energy is a solar inverter manufacturer. Their inverters include a built-in web server
    that serves compressed HTML over HTTP for monitoring inverter status and energy production data.
    Devices are commonly deployed on residential and commercial solar installations.
  reference:
    - https://kaco-newenergy.com/
  metadata:
    max-request: 1
    verified: true
    shodan-query: http.title:"KACO new energy"
    vendor: kaco
    product: solar-inverter
  tags: tech,panel,kaco,ics,solar,energy,inverter,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    headers:
      Accept-Encoding: gzip

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'KACO new energy'

      - type: word
        part: body
        words:
          - 'KACO inverter web page'
          - 'KACO new energy'
        condition: or

      - type: status
        status:
          - 200
