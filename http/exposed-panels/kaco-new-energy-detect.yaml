id: kaco-new-energy-detect

info:
  name: KACO New Energy Solar Inverter - Detect
  author: rxerium
  severity: info
  description: |
    KACO new energy is a solar inverter manufacturer. Their inverters include a built-in web server that serves compressed HTML over HTTP for monitoring inverter status and energy production data. Devices are commonly deployed on residential and commercial solar installations.
  reference:
  - https://kaco-newenergy.com/
  metadata:
    max-request: 1
    shodan-query: http.title:"KACO new energy"
    vendor: kaco
    product: solar-inverter
  tags: tech,panel,kaco,ics,solar,energy,inverter,detect

http:
- method: GET
  path:
  - "{{BaseURL}}"

  headers:
    Accept-Encoding: gzip

  matchers-condition: and
  matchers:
  - type: word
    words:
    - "KACO"
    - "new energy"
    part: body
    condition: and

  - type: status
    status:
    - 200
