id: jupyterhub-panel

info:
  name: JupyterHub Panel - Detect
  author: rxerium
  severity: info
  description: |
    JupyterHub is a multi-user server for Jupyter notebooks
  reference:
    - https://github.com/jupyterhub/jupyterhub
    - https://jupyter.org/hub
  metadata:
    verified: true
    max-request: 1
    vendor: jupyter
    product: jupyterhub
    shodan-query: 'http.title:"JupyterHub"'
  tags: panel,jupyterhub,jupyter,ml,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/hub/login"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '(?i)<title>[^<]*JupyterHub[^<]*</title>'

      - type: status
        status:
          - 200
