id: odoo-website-info-exposure

info:
  name: Odoo Website - Information Disclosure
  author: aushack
  severity: info
  description: |
    Detected exposure of the Odoo website info page, which discloses installed applications and extensions that could aid reconnaissance.
  metadata:
    verified: true
    max-request: 1
    vendor: odoo
    product: odoo
    shodan-query:
      - title:"Odoo"
      - http.title:"odoo"
      - cpe:"cpe:2.3:a:odoo:odoo"
    fofa-query: title="odoo"
    google-query: intitle:"odoo"
  tags: info,odoo,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/website/info"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'instance of Odoo, the <a target="_blank" href="https://www.odoo.com">Open Source ERP</a>'
          - 'Installed Applications'

      - type: status
        status:
          - 200
