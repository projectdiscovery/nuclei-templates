id: odoo-website-info

info:
  name: Odoo - Website Information Detection
  author: aushack
  severity: info
  description: Odoo Website Info page reveals the applications and extensions installed on the server.
  classification:
    cpe: cpe:2.3:a:odoo:odoo:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    vendor: odoo
    product: odoo
    shodan-query:
      - title:"Odoo"
      - http.title:"odoo"
      - cpe:"cpe:2.3:a:odoo:odoo"
    fofa-query: title="odoo"
    google-query: intitle:"odoo"
  tags: info,odoo,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/website/info"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'instance of Odoo, the <a target="_blank" href="https://www.odoo.com">Open Source ERP</a>'
          - 'Installed Applications'

      - type: status
        status:
          - 200
