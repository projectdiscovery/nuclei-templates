id: serge-panel

info:
  name: Serge Panel - Detect
  author: rxerium
  severity: info
  description: |
    Serge is a web interface for chatting with Alpaca through llama.cpp. This template detects the presence of a Serge chat interface.
  reference:
    - https://github.com/serge-chat/serge
    - https://serge.chat
  metadata:
    verified: true
    max-request: 1
    vendor: serge-chat
    product: serge
    shodan-query: 'http.title:"Serge" port:8008'
  tags: panel,serge,llm,ai,chat,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    
    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Serge - Powered by LLaMA"
      
      - type: status
        status:
          - 200
