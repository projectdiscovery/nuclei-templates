id: osisoft-pi-vision-panel

info:
  name: OSIsoft PI Vision - Login Panel
  author: rxerium
  severity: info
  description: |
    OSIsoft PI Vision (now AVEVA PI Vision) is a web-based data visualisation platform for the PI System, widely used in energy, utilities, oil and gas, and manufacturing for real-time operational data monitoring. Exposed instances may provide access to sensitive operational technology data.
  reference:
    - https://www.aveva.com/en/products/pi-vision/
    - https://docs.aveva.com/bundle/pi-vision/
  metadata:
    max-request: 2
    shodan-query: 'http.title:"PI Vision"'
  tags: panel,scada,historian,ics,osisoft,aveva,pi-vision,pi-system,energy,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "PI"
          - "Vision"
        condition: and

      - type: status
        status:
          - 200
