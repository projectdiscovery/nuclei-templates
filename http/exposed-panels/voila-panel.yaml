id: voila-panel

info:
  name: Voilà Panel - Detect
  author: rxerium
  severity: info
  description: |
    Voilà is an open-source tool that turns Jupyter Notebooks into standalone web applications.
    It is commonly used to share AI/ML dashboards and interactive data science tools.
  reference:
    - https://github.com/voila-dashboards/voila
    - https://voila.readthedocs.io
  metadata:
    verified: true
    max-request: 1
    vendor: Voilà
    product: Voilà
    shodan-query: 'html:"/voila/"'
  tags: panel,voila,jupyter,notebook,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "voila-notebooks"

      - type: regex
        part: body
        regex:
          - '(?i)<title>[^<]*Voil[^<]*</title>'

      - type: status
        status:
          - 200
