id: westermo-router-panel

info:
  name: Westermo Industrial Router - Login Panel
  author: rxerium
  severity: info
  description: |
    Westermo industrial router web interface panel has been detected.
  reference:
    - https://www.westermo.com/
  metadata:
    max-request: 1
    verified: true
    vendor: Westermo
    product: lynx-router
    shodan-query: 'http.html:"Westermo"'
  tags: panel,westermo,router,ics,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>lynx - westermo</title>'

      - type: word
        part: body
        words:
          - 'westermo.com'
          - 'lynx - westermo'
        condition: or

      - type: status
        status:
          - 200