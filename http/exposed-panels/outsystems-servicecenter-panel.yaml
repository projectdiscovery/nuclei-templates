id: outsystems-servicecenter-panel

info:
  name: OutSystems Service Center Login Panel - Detect
  author: righettod
  severity: info
  description: |
    OutSystems Service Center login panel was detected.
  reference:
    - https://www.outsystems.com/
  classification:
    cpe: cpe:2.3:a:outsystems:platform_server:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 2
    vendor: outsystems
    product: platform_server
    shodan-query: http.html:"outsystems"
  tags: panel,outsystems,login,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/Login.aspx"
      - "{{BaseURL}}/ServiceCenter/Login.aspx"

    host-redirects: true
    max-redirects: 2

    stop-at-first-match: true

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(body, "Enter your OutSystems credentials")'
        condition: and

      - type: word
        part: set_cookie
        words:
          - "osVisitor="
          - "osVisit="
        condition: or

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - 'environmentName:.?([a-z0-9A-Z\s]+).?'
