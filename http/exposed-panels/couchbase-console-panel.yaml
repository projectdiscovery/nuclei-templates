id: couchbase-console-panel

info:
  name: Couchbase Server Console - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    Couchbase Server administrative console was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Couchbase Console"
  tags: panel,login,couchbase,console,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/ui/index.html"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        condition: or
        words:
          - "Couchbase Console"
          - "Couchbase Server"

      - type: status
        status:
          - 200
