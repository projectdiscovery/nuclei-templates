id: sel-rtac-panel

info:
  name: SEL Real-Time Automation Controller - Login Panel
  author: rxerium
  severity: info
  description: |
    Schweitzer Engineering Laboratories (SEL) Real-Time Automation Controller (RTAC)
    is a programmable automation controller used in electric utility and industrial
    automation environments for protection, control, and automation. The web interface
    exposes a management panel for configuration and monitoring.
  reference:
    - https://selinc.com/products/3530/
    - https://selinc.com/products/3555/
  metadata:
    max-request: 2
    verified: true
    vendor: Schweitzer Engineering Laboratories
    product: sel-rtac
    shodan-query: http.title:"SEL-RTAC"
  tags: panel,scada,ics,sel,rtac,schweitzer,energy,utilities,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>SEL-RTAC</title>'
          - 'selinc.com'
          - 'SEL-RTAC'
        condition: or

      - type: status
        status:
          - 200
