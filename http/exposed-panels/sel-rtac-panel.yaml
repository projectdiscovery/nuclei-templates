id: sel-rtac-panel

info:
  name: SEL Real-Time Automation Controller - Login Panel
  author: rxerium
  severity: info
  description: |
    Schweitzer Engineering Laboratories (SEL) Real-Time Automation Controller (RTAC) is a programmable automation controller used in electric utility and industrial automation environments for protection, control, and automation. The web interface exposes a management panel for configuration and monitoring.
  reference:
    - https://selinc.com/products/3530/
    - https://selinc.com/products/3555/
  metadata:
    max-request: 2
    shodan-query: http.title:"SEL-RTAC"
  tags: panel,scada,ics,sel,rtac,schweitzer,energy,utilities,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'SEL-RTAC'

      - type: status
        status:
          - 200
