id: sigma-air-manager-panel

info:
  name: kaeser sigma air manager login Panel - Detect
  author: Th3l0newolf
  severity: info
  description:
    Detects exposed KAESER CONNECT SIGMA AIR MANAGER 4.0 login panel
  reference:
    - https://www.kaeser.com/
  metadata:
    verified: true
    shodan-query: http.title:"SIGMA AIR MANAGER"
  tags: kaeser,login,panel,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/HMI/login.html"

    matchers:
      - type: dsl
        dsl:
          - contains(body, "SIGMA AIR MANAGER")
          - status_code == 200
        condition: and
