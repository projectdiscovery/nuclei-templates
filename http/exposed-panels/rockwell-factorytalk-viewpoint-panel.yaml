id: rockwell-factorytalk-viewpoint-panel

info:
  name: Rockwell Automation FactoryTalk ViewPoint - Panel
  author: rxerium
  severity: info
  description: |
    Rockwell Automation FactoryTalk ViewPoint is a web-based HMI that allows remote monitoring and control of industrial automation systems from a browser. It provides access to FactoryTalk View Machine Edition and Site Edition displays. Exposed instances may allow unauthorised access to industrial control system visualisations.
  reference:
    - https://www.rockwellautomation.com/en-us/products/software/factorytalk/operationsuite/view/factorytalk-viewpoint.html
  metadata:
    max-request: 1
    shodan-query: 'http.title:"FactoryTalk ViewPoint"'
  tags: panel,ics,scada,rockwell,factorytalk,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '/ftvp/ViewPoint.aspx'

      - type: status
        status:
          - 200
