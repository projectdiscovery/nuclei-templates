id: open-webui-panel

info:
  name: Open WebUI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Open WebUI is an extensible, self-hosted AI interface that supports Ollama and
    OpenAI-compatible APIs. This template detects exposed Open WebUI instances.
  reference:
    - https://github.com/open-webui/open-webui
    - https://openwebui.com
  metadata:
    verified: true
    max-request: 1
    vendor: open-webui
    product: open-webui
    shodan-query: 'http.title:"Open WebUI"'
  tags: panel,open-webui,ollama,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Open WebUI</title>"

      - type: status
        status:
          - 200
