id: evidently-ai-panel

info:
  name: Evidently AI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Evidently AI is an ML/LLM observability platform for monitoring data drift and model performance. This template detects exposed Evidently web interfaces.
  reference:
    - https://github.com/evidentlyai/evidently
    - https://www.evidentlyai.com
  metadata:
    verified: true
    max-request: 1
    vendor: evidently-ai
    product: evidently
    shodan-query: 'http.title:"Evidently"'
  tags: panel,evidently,ai,ml,monitoring,observability,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '(?i)<title>[^<]*Evidently[^<]*</title>'

      - type: status
        status:
          - 200
