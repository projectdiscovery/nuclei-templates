id: unifi-securitygateway-panel

info:
  name: Ubiquiti UniFi Security Gateway - Login Panel
  author: rxerium
  severity: info
  description: |
    Ubiquiti UniFi Security Gateway management panel detected.
  reference:
    - https://www.ui.com/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"UniFi Security Gateway"'
  tags: panel,ubiquiti,unifi,securitygateway

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'UniFi Security Gateway'

      - type: status
        status:
          - 200
