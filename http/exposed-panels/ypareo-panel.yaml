id: ypareo-panel

info:
  name: YPAREO Panel - Detect
  author: righettod
  severity: info
  description: |
     YPAREO was detected — an Enterprise Resource Planning system.
  reference:
    - https://www.ypareo.com/legacy
    - https://www.ymag.fr/
  metadata:
    verified: true
    max-request: 1
    shodan-query: http.html:"ypareo"
  tags: panel,ymag,login,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php"
      - "{{BaseURL}}/net-ypareo/index.php"
      - "{{BaseURL}}/netypareo/index.php"
      - "{{BaseURL}}/index.html"

    stop-at-first-match: true

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_any(to_lower(body), "<title>ypareo", "/net-ypareo/", "/netypareo/")'
        condition: and

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - 'script.js\?v=([0-9.]+)'
