id: mlflow-panel

info:
  name: MLflow Panel - Detect
  author: rxerium
  severity: info
  description: |
    MLflow is an open-source platform for managing the end-to-end machine learning
    lifecycle including experimentation, reproducibility, and deployment. This template
    detects exposed MLflow tracking server UI instances.
  reference:
    - https://github.com/mlflow/mlflow
    - https://mlflow.org
  metadata:
    verified: true
    max-request: 1
    vendor: databricks
    product: mlflow
    shodan-query: 'http.title:"MLflow"'
  tags: panel,mlflow,ml,ai,mlops,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "MLflow"

      - type: status
        status:
          - 200
