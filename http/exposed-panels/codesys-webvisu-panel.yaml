id: codesys-webvisu-panel

info:
  name: CODESYS WebVisu - Panel
  author: rxerium
  severity: info
  description: |
    CODESYS WebVisu is the web-based HMI (Human-Machine Interface) component of the CODESYS industrial automation runtime. It provides browser-based access to PLC visualizations and industrial control interfaces. Exposed instances may reveal real-time process data and control functions without authentication.
  reference:
    - https://www.codesys.com/products/codesys-runtime/web-visualization.html
  metadata:
    max-request: 1
    shodan-query: 'html:"WEBVISU LOGIN"'
  tags: panel,ics,scada,codesys,webvisu,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'WebVisu Authentication'

      - type: status
        status:
          - 200
