id: typesense-detect

info:
  name: Typesense Search Server - Detect
  author: ChrisJr404
  severity: info
  description: |
    Typesense (typesense.org / github.com/typesense/typesense) is an open-source typo-tolerant search engine, often self-hosted on TCP 8108. It exposes an unauthenticated /health endpoint and an admin /stats.json endpoint that requires the X-TYPESENSE-API-KEY header. Exposed instances may reveal collection schemas, document counts and, with the API key leaked, full read/write access.
  reference:
    - https://github.com/typesense/typesense
    - https://typesense.org/docs/latest/api/
  metadata:
    verified: true
    max-request: 1
    vendor: typesense
    product: typesense
    shodan-query: '"x-typesense"'
    fofa-query: 'header="x-typesense"'
  tags: typesense,search,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/health"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(body, "\"ok\":true")'
          - 'contains(to_lower(header), "x-typesense") || contains(to_lower(header), "application/json")'
        condition: and
