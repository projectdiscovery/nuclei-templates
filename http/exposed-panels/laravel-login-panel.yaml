id: laravel-login-panel

info:
  name: Laravel Login - Panel Detection
  author: ProjectDiscoveryAI
  severity: info
  description: |
    A Laravel login panel was detected.
  metadata:
    verified: true
    max-request: 3
    shodan-query: title:"Login Laravel"
  tags: laravel,login,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/admin/login"
      - "{{BaseURL}}/authentication/login"
      - "{{BaseURL}}/login"

    stop-at-first-match: true

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'content="Laravel"'
          - "Laravel Login"
        condition: or

      - type: status
        status:
          - 200
