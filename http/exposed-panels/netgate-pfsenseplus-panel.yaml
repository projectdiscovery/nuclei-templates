id: netgate-pfsenseplus-panel

info:
  name: Netgate pfSense Plus - Login Panel
  author: rxerium
  severity: info
  description: |
    Netgate pfSense Plus firewall login panel detected.
  reference:
    - https://www.netgate.com/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"Netgate"'
  tags: panel,netgate,pfsense,firewall

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Netgate pfSense Plus'
        part: body

      - type: status
        status:
          - 200