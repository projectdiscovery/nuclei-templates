id: redlion-hmi-panel

info:
  name: Red Lion HMI - Login Panel
  author: rxerium
  severity: info
  description: |
    Red Lion HMI web interface panel has been detected.
  reference:
  - https://www.redlion.net/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"Red Lion"'
  tags: panel,redlion,hmi,ics,discovery

http:
- method: GET
  path:
  - "{{BaseURL}}"

  matchers-condition: and
  matchers:
  - type: word
    words:
    - "Red Lion Controls"
    - "www.redlion.net"
    condition: and

  - type: status
    status:
    - 200
