id: outback-power-detect

info:
  name: OutBack Power Mate3s Gateway - Detect
  author: rxerium
  severity: info
  description: |
    OutBack Power Mate3s is a system hub and gateway for OutBack FX-series inverter-chargers
    used in off-grid, grid-hybrid, and battery backup solar power systems.
    The built-in web interface exposes system status, battery metrics, and inverter data.
  reference:
    - https://www.outbackpower.com/outback-products/communications/detail/mate3s
  metadata:
    max-request: 1
    shodan-query: http.title:"Outback Power"
    vendor: outback-power
    product: mate3s
  tags: tech,panel,outback,ics,solar,energy,scada,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Outback Power</title>'
        part: body

      - type: word
        words:
          - 'status_tab'
          - 'meters_tab'
        part: body
        condition: and

      - type: status
        status:
          - 200
