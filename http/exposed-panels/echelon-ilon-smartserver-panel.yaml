id: echelon-ilon-smartserver-panel

info:
  name: Echelon i.LON SmartServer - Login Panel
  author: rxerium
  severity: info
  description: |
    Echelon (now Adesto/Dialog Semiconductor) i.LON SmartServer is a LonWorks/IP-852 building automation controller used in HVAC, lighting, and energy management systems. The embedded web interface is frequently exposed on standard and non-standard ports.
  reference:
    - https://www.echelon.com/products/ilon-smartserver/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"i.LON SmartServer"'
  tags: panel,echelon,ilon,lonworks,scada,ics,ot,building-automation,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'i.LON SmartServer'

      - type: status
        status:
          - 200
