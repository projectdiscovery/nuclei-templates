id: echelon-ilon-smartserver-panel

info:
  name: Echelon i.LON SmartServer - Login Panel
  author: rxerium
  severity: info
  description: |
    Echelon (now Adesto/Dialog Semiconductor) i.LON SmartServer is a LonWorks/IP-852
    building automation controller used in HVAC, lighting, and energy management systems.
    The embedded web interface is frequently exposed on standard and non-standard ports.
  reference:
    - https://www.echelon.com/products/ilon-smartserver/
  metadata:
    max-request: 1
    verified: true
    vendor: Echelon
    product: ilon-smartserver
    shodan-query: 'http.title:"i.LON SmartServer"'
  tags: panel,echelon,ilon,lonworks,scada,ics,ot,building-automation,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'i.LON SmartServer'

      - type: word
        part: body
        words:
          - 'Echelon'
          - 'SmartServer'
        condition: or

      - type: status
        status:
          - 200