id: fastgpt-panel

info:
  name: FastGPT Panel - Detect
  author: rxerium
  severity: info
  description: |
    FastGPT is a knowledge-based platform built on the LLM, offering out-of-the-box
    data processing and model invocation capabilities.
  reference:
    - https://github.com/labring/FastGPT
    - https://fastgpt.in
  metadata:
    verified: true
    max-request: 1
    vendor: labring
    product: fastgpt
    shodan-query: 'http.title:"FastGPT"'
  tags: panel,fastgpt,llm,ai,rag,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "FastGPT"

      - type: status
        status:
          - 200
