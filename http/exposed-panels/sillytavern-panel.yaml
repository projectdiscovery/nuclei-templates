id: sillytavern-panel

info:
  name: SillyTavern Panel - Detect
  author: rxerium
  severity: info
  description: |
    SillyTavern was detected. SillyTavern is a character-based AI roleplay and chat frontend that connects to local or remote LLM backends. Exposed instances may allow unauthenticated access to AI models and conversation history.
  reference:
    - https://github.com/SillyTavern/SillyTavern
    - https://docs.sillytavern.app/
  metadata:
    verified: true
    max-request: 1
    vendor: SillyTavern
    product: sillytavern
    shodan-query: 'http.title:"SillyTavern"'
  tags: panel,sillytavern,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>SillyTavern</title>"

      - type: status
        status:
          - 200
