id: ivanti-sentry-panel

info:
  name: Ivanti Sentry Panel - Detect
  author: DhiyaneshDk
  severity: info
  description: |
    Ivanti Sentry panel was detected.
  metadata:
    verified: true
    max-request: 1
    product: sentry
    shodan-query: http.favicon.hash:967636089
  tags: panel,ivanti,discovery,login,sentry

http:
  - method: GET
    path:
      - "{{BaseURL}}/mics/login.jsp"

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: word
        words:
          - "Ivanti System Manager"
          - "sentry"
        condition: and

    extractors:
      - type: regex
        group: 1
        regex:
          - \?([\d.]+)"
