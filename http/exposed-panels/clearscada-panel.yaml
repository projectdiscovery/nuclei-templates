id: clearscada-panel

info:
  name: Schneider Electric ClearSCADA - Panel
  author: rxerium
  severity: info
  description: |
    ClearSCADA (now branded as EcoStruxure Geo SCADA Expert) is a Schneider Electric
    SCADA platform used in water, oil and gas, and utilities sectors. Exposed instances
    may provide unauthenticated access to industrial process data and control interfaces.
  reference:
    - https://www.se.com/ww/en/work/products/product-launch/scada/
    - https://www.se.com/us/en/faqs/FA298792/
  metadata:
    max-request: 1
    verified: true
    vendor: Schneider Electric
    product: clearscada
    shodan-query: 'http.title:"ClearSCADA"'
  tags: panel,ics,scada,schneider,clearscada,discovery

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'ClearSCADA Home'
          - 'ClearSCADA'
          - '/webservices'
        condition: or

      - type: status
        status:
          - 200
