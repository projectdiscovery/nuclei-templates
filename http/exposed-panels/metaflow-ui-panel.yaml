id: metaflow-ui-panel

info:
  name: Metaflow UI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Metaflow is an open-source ML platform created by Netflix for building and managing real-life data science projects.
    The Metaflow UI provides a web interface for monitoring and managing Metaflow runs and flows.
  reference:
    - https://github.com/Netflix/metaflow-ui
    - https://metaflow.org
  metadata:
    verified: true
    max-request: 1
    vendor: Netflix
    product: Metaflow UI
    shodan-query: 'http.title:"Metaflow UI"'
  tags: panel,metaflow,netflix,mlops,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Metaflow UI</title>"

      - type: word
        part: body
        words:
          - "webpackJsonpmetaflow-ui"
          - "metaflow-ui"
        condition: or

      - type: status
        status:
          - 200
