id: cyberoam-firewall-panel

info:
  name: Cyberoam Firewall - Login Panel
  author: rxerium
  severity: info
  description: |
    Cyberoam UTM firewall login panel detected.
  reference:
    - https://www.cyberoam.com/
  metadata:
    max-request: 1
    shodan-query: 'http.title:"Cyberoam"'
  tags: panel,cyberoam,firewall,utm

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Cyberoam</title>'

      - type: status
        status:
          - 200
