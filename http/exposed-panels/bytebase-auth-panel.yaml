id: bytebase-auth-panel

info:
  name: Bytebase Auth - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    Bytebase authentication interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Bytebase"
  tags: panel,login,bytebase,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/auth"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(to_lower(body), "<title>bytebase</title>")'
        condition: and
