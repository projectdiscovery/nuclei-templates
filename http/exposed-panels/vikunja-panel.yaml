id: vikunja-panel

info:
  name: Vikunja Login Panel - Detect
  author: matheusalbarello
  severity: info
  description: |
    Vikunja login panel was detected. Vikunja is a self-hosted to-do and project management application.
  reference:
    - https://vikunja.io
    - https://github.com/go-vikunja/vikunja
  metadata:
    verified: true
    max-request: 1
    vendor: vikunja
    product: vikunja
    shodan-query:
      - title:"Vikunja"
      - http.title:"vikunja"
    fofa-query: title="Vikunja"
    google-query: intitle:"Vikunja"
  tags: panel,vikunja,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Server: Vikunja"

      - type: word
        part: body
        words:
          - "<title>Vikunja</title>"
          - "The to-do app to organize your life"
        condition: and

      - type: status
        status:
          - 200
