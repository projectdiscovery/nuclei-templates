id: flowise-panel

info:
  name: Flowise Panel - Detect
  author: rxerium
  severity: info
  description: |
    Flowise panel was detected. Flowise is an open-source drag-and-drop LLM flow builderand AI agent platform. Exposed instances may reveal AI workflow configurations, API keys, and connected data sources.
  reference:
    - https://github.com/FlowiseAI/Flowise
    - https://flowiseai.com/
  metadata:
    verified: true
    max-request: 1
    vendor: FlowiseAI
    product: flowise
    shodan-query: 'http.title:"Flowise - Build AI Agents, Visually"'
  tags: panel,flowise,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Flowise - Build AI Agents, Visually</title>"

      - type: status
        status:
          - 200
