id: facefusion-panel

info:
  name: FaceFusion Panel - Detect
  author: rxerium
  severity: info
  description: |
    FaceFusion panel was detected. FaceFusion is a next-generation face swapper and enhancer.
  reference:
    - https://github.com/facefusion/facefusion
    - https://facefusion.io
  metadata:
    verified: true
    max-request: 1
    vendor: facefusion
    product: facefusion
    shodan-query: 'http.title:"FaceFusion"'
  tags: panel,facefusion,ai,face-swap,deepfake,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "FaceFusion"
          - "_app.config.js"
        condition: and

      - type: status
        status:
          - 200
