id: vtscada-panel

info:
  name: VTScada - Internet Client Panel
  author: rxerium
  severity: info
  description: |
    VTScada (by Trihedral Engineering) is a SCADA platform used in water/
    wastewater, oil and gas, and utilities. The Internet Client feature exposes
    a browser-based view of process data, and is commonly deployed by municipal
    water systems across North America.
  reference:
    - https://www.trihedral.com/vtscada/
  metadata:
    max-request: 1
    shodan-query: http.title:"VTScada Internet Client from Trihedral"
  tags: panel,scada,ics,vtscada,trihedral,utilities,water,oil-gas,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    redirects: true

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'VTScada'

      - type: status
        status:
          - 200
