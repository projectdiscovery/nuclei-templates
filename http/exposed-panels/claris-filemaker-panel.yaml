id: claris-filemaker-panel

info:
  name: Claris FileMaker Server Admin Console - Detect
  author: s4e-io
  severity: info
  description: Claris FileMaker Server Admin Console panel was detected.
  reference:
    - https://www.claris.com/filemaker/server/
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
    cpe: cpe:2.3:a:claris:filemaker_server:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 1
    vendor: claris
    product: filemaker_server
    shodan-query: title:"Claris FileMaker "
    fofa-query: title="Claris FileMaker"
    google-query: intitle:"Claris FileMaker"
  tags: panel,filemaker,claris,detect

http:
  - method: GET
    path:
      - '{{BaseURL}}/admin-console/signin'

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Claris FileMaker Server Admin Console</title>'

      - type: status
        status:
          - 200
