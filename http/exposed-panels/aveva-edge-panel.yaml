id: aveva-edge-panel

info:
  name: AVEVA Edge SCADA - Login Panel
  author: rxerium
  severity: info
  description: |
    AVEVA Edge SCADA web interface panel has been detected.
  reference:
    - https://www.aveva.com/
  metadata:
    max-request: 1
    verified: true
    vendor: AVEVA
    product: aveva-edge
    shodan-query: 'http.html:"Aveva Edge"'
  tags: panel,aveva,edge,scada,ics,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'ISSymbol1.ProductName = "AVEVA Edge"'

      - type: word
        part: body
        words:
          - 'GENERATOR" content="AVEVA Edge'

      - type: status
        status:
          - 200