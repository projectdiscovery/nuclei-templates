id: aveva-edge-panel

info:
  name: AVEVA Edge SCADA - Login Panel
  author: rxerium
  severity: info
  description: |
    AVEVA Edge SCADA web interface panel has been detected.
  reference:
    - https://www.aveva.com/
  metadata:
    max-request: 1
    shodan-query: 'http.html:"Aveva Edge"'
  tags: panel,aveva,edge,scada,ics,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'ProductName = "AVEVA Edge"'

      - type: status
        status:
          - 200
