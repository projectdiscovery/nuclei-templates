id: aveva-edge-panel

info:
  name: AVEVA Edge SCADA - Login Panel
  author: rxerium
  severity: info
  description: |
    AVEVA Edge SCADA web interface panel has been detected.
  reference:
    - https://www.aveva.com/
  metadata:
    max-request: 1
    verified: true
    vendor: AVEVA
    product: aveva-edge
    shodan-query: 'http.html:"Aveva Edge"'
  tags: panel,aveva,edge,scada,ics,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_all(body, "ISSymbol1.ProductName = \"AVEVA Edge\"", "GENERATOR\" content=\"AVEVA Edge")'
        condition: and
