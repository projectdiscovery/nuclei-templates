id: arize-phoenix-panel

info:
  name: Arize Phoenix - Detect
  author: rxerium
  severity: info
  description: |
    Arize Phoenix is an open-source AI observability and evaluation platform for monitoring,
    debugging, and evaluating LLM applications. This template detects exposed instances.
  reference:
    - https://github.com/Arize-ai/phoenix
    - https://phoenix.arize.com
  metadata:
    verified: true
    max-request: 1
    vendor: Arize-ai
    product: phoenix
    shodan-query: 'http.title:"Phoenix" port:6006 http.html:"arize"'
  tags: panel,arize,phoenix,llm,ai,observability,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Arize Phoenix"
          - "<title>Phoenix"
        condition: and

      - type: status
        status:
          - 200
