id: polynote-panel

info:
  name: Polynote Panel - Detect
  author: rxerium
  severity: info
  description: |
    Polynote is a polyglot notebook supporting Scala, Python, SQL, and Spark with a rich UI. This template detects exposed Polynote web interfaces.
  reference:
    - https://github.com/polynote/polynote
    - https://polynote.org
  metadata:
    verified: true
    max-request: 1
    vendor: polynote
    product: polynote
    shodan-query: 'http.title:"Polynote"'
  tags: panel,polynote,notebook,scala,python,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Polynote</title>"

      - type: status
        status:
          - 200
