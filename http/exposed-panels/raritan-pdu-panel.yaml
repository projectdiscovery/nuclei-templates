id: raritan-pdu-panel

info:
  name: Raritan PDU - Login Panel
  author: rxerium
  severity: info
  description: |
    Raritan intelligent PDU web interface panel has been detected.
  reference:
    - https://www.raritan.com/
  metadata:
    max-request: 1
    verified: true
    vendor: Raritan
    product: pdu
    shodan-query: 'http.html:"Raritan" http.html:"PDU"'
  tags: panel,raritan,pdu,ics,power,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Product: Raritan PDU'
          - 'PDU G2'
          - 'responsive-gui'
        condition: or

      - type: status
        status:
          - 200