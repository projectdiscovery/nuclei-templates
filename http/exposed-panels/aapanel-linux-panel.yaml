id: aapanel-linux-panel

info:
  name: aaPanel Linux Panel - Detect
  author: Th3l0newolf
  severity: info
  description: |
    Detected aaPanel Linux management panel login interface.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 2
    verified: true
    vendor: aapanel
    product: aapanel
    shodan-query: html:"aaPanel Linux panel"
    fofa-query: title="aaPanel Linux panel"
  tags: panel,aapanel,linux,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/login"

    stop-at-first-match: true

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_any(body, "<title>aaPanel Linux panel", "Login with aaPanel Mobile", "aaPanel Linux panel")'
        condition: and
