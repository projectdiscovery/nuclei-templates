id: aapanel-linux-panel

info:
  name: aaPanel Linux Panel - Login Detect
  author: Th3l0newolf
  severity: info
  description: |
    aaPanel Linux management panel login interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 2
    verified: true
    shodan-query: html:"aaPanel Linux panel"
  tags: panel,login,aapanel,linux,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/login?err=1"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>aaPanel Linux panel</title>"
          - '<div class="scan_title">Login with aaPanel Mobile</div>'

      - type: status
        status:
          - 200
