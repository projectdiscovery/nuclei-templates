id: xerox-panel

info:
  name: Xerox Fuji/VersaLink Login - Panel
  author: DhiyaneshDk
  severity: info
  description: |
    Xerox Fuji / VersaLink Login Panel was discovered
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    fofa-query: body="/XUX-nwave/"
  tags: panel,xerox,discovery,login

http:
  - method: GET
    path:
      - '{{BaseURL}}/home/index.html#hashHome'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '/XUX-nwave/'
          - 'xuxInitialize'
        condition: and

      - type: status
        status:
          - 200
