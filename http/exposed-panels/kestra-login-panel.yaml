id: kestra-login-panel

info:
  name: Kestra Login - Panel Detect
  author: Th3l0newolf
  severity: info
  description: |
    Kestra login interface was discovered.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Kestra"
  tags: panel,login,kestra,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/ui/login?from=/dashboards"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        condition: and
        words:
          - "<title>Kestra</title>"
          - 'window.KESTRA_UI_PATH = "/ui/";'

      - type: status
        status:
          - 200
