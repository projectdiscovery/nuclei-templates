id: stable-diffusion-webui-panel

info:
  name: Stable Diffusion WebUI Panel - Detect
  author: rxerium
  severity: info
  description: |
    Stable Diffusion WebUI panel was detected. Stable Diffusion WebUI is a web-based interface
    for running Stable Diffusion AI image generation models locally. Publicly exposed instances
    may allow unauthenticated access to the image generation interface and stored model configurations.
  reference:
    - https://github.com/AUTOMATIC1111/stable-diffusion-webui
    - https://github.com/lllyasviel/stable-diffusion-webui-forge
  metadata:
    verified: true
    max-request: 1
    vendor: AUTOMATIC1111
    product: stable-diffusion-webui
    shodan-query: 'http.title:"Stable Diffusion" port:7860'
  tags: panel,stable-diffusion,ai,image-generation,llm,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Stable Diffusion</title>"

      - type: status
        status:
          - 200
