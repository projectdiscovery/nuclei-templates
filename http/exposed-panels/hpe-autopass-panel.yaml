id: hpe-autopass-detect

info:
  name: hpe autopass detect
  author: Eyonn
  severity: info
  description: Detects exposed /autopass endpoint over HTTPS on port 5814.
  tags: exposure,autopass,hpe

http:
  - method: GET
    path:
      - "https://{{Hostname}}:5814/autopass"
      - "https://{{Hostname}}:5814/autopass/"
    redirects: true
    max-redirects: 2
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: regex
        part: body
        regex:
          - "(?i)autopass"