id: homarr-panel

info:
  name: Homarr Dashboard - Detect
  author: potato-20
  severity: info
  description: |
    Homarr dashboard panel was detected. Homarr is a self-hosted dashboard for managing homelab and *arr-stack services.
  reference:
    - https://github.com/homarr-labs/homarr
    - https://homarr.dev
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
    cpe: cpe:2.3:a:homarr:homarr:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 1
    product: homarr
    vendor: homarr
    fofa-query: title="Homarr"
    shodan-query: http.title:"Homarr"
  tags: panel,homarr,dashboard,oss,discovery

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: response
        words:
          - '<title>Homarr</title>'
          - 'content="Homarr'
          - 'homarr.locale'
          - 'alt="Homarr'
        condition: or

      - type: status
        status:
          - 200
