id: blinko-login-panel

info:
  name: Blinko - Login Panel Detection
  author: 0x_Akoko
  severity: info
  description: |
    Detected A Blinko self-hosted personal note application login panel.
  reference:
    - https://github.com/blinko-space/blinko
  metadata:
    verified: true
    max-request: 1
    shodan-query: title:"Blinko"
    fofa-query: title="Blinko"
  tags: panel,blinko,login,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/signin"

    host-redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains_all(body, "<title>Blinko</title>", "Blinko self-hosted personal note")'
        condition: and
