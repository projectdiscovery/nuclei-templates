id: langsmith-panel

info:
  name: LangSmith Panel - Detect
  author: rxerium
  severity: info
  description: |
    LangSmith panel was detected. LangSmith is LangChain's platform for debugging, testing, evaluating, and monitoring LLM applications.
  reference:
    - https://smith.langchain.com/
    - https://docs.smith.langchain.com/
  metadata:
    verified: true
    max-request: 1
    vendor: langchain
    product: langsmith
    shodan-query: 'http.title:"LangSmith"'
  tags: panel,langsmith,langchain,llm,ai,observability,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>LangSmith</title>"

      - type: status
        status:
          - 200
