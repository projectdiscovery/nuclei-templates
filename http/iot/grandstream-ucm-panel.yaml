id: grandstream-ucm-panel

info:
  name: Grandstream UCM - Panel Detection
  author: DhiyaneshDk
  severity: info
  description: |
    Detected the presence of a Grandstream UCM (Unified Communications Manager) web management login panel. The React-based SPA loads characteristic JavaScript modules including tl.account.ucm.js and webpack chunks for UCM modules.
  classification:
    cpe: cpe:2.3:o:grandstream:ucm6200_firmware:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 1
    vendor: grandstream
    product: ucm6200_firmware
    shodan-query: 'ssl:"Grandstream" "Set-Cookie: TRACKID"'
  tags: panel,grandstream,ucm,iot,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "tl.account.ucm.js"
          - "tl.phoneSettings.js"
        condition: and

      - type: word
        words:
          - "tl.maintenance.js"
          - "tl.sysSettings.js"
        condition: or

      - type: status
        status:
          - 200
