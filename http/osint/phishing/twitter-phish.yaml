id: twitter-phish

info:
  name: Twitter/X phishing Detection
  author: rxerium
  severity: info
  description: |
    A Twitter/X phishing website was detected
  reference:
    - https://twitter.com
    - https://x.com
  metadata:
    max-request: 1
  tags: phishing,twitter,x,osint,discovery
http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Sign in to X'
          - 'Log in to X'
          - 'Sign in to Twitter'
          - 'Log in to Twitter'
        condition: or

      - type: word
        part: body
        words:
          - 'type="password"'
          - "type='password'"
        condition: or

      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - '!contains(host,"twitter.com")'
          - '!regex("(^|\\.)x\\.com$", host)'
          - '!contains(host,"twimg.com")'
        condition: and
