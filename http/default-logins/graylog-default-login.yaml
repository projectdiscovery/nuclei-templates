id: graylog-default-login

info:
  name: Graylog - Default Admin Credentials
  author: 0x_Akoko
  severity: high
  description: |
    Detected that Graylog was using the default credentials admin:admin. The VM/OVA appliance shipped with admin:admin out of the box.
  reference:
    - https://go2docs.graylog.org/current/setting_up_graylog/rest_api.html
    - https://archivedocs.graylog.org/en/2.5/pages/installation/virtual_machine_appliances.html
  metadata:
    verified: true
    max-request: 2
    vendor: graylog
    product: graylog
    shodan-query: 'title:"Graylog Web Interface"'
    fofa-query: 'app="Graylog" || title="Graylog Web Interface"'
  tags: default-login,graylog,auth

variables:
  username: "admin"
  password: "admin"

flow: http(1) && http(2)

http:
  - raw:
      - |
        GET /api/ HTTP/1.1
        Host: {{Hostname}}
        Accept: application/json

    matchers:
      - type: dsl
        internal: true
        dsl:
          - 'status_code == 200'
          - 'contains(content_type, "application/json")'
          - 'contains_all(body, "\"cluster_id\"", "\"node_id\"", "\"version\"")'
        condition: and

  - raw:
      - |
        POST /api/system/sessions HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json
        X-Requested-By: nuclei

        {"username":"{{username}}","password":"{{password}}","host":""}

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(content_type, "application/json")'
          - 'contains_all(body, "\"session_id\"", "\"valid_until\"")'
        condition: and

    extractors:
      - type: regex
        name: session_id
        part: body
        regex:
          - '"session_id"\s*:\s*"([^"]+)"'
