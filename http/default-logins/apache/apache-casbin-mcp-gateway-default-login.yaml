id: apache-casbin-mcp-gateway-default-login

info:
  name: Apache Casbin MCP Gateway - Default Login
  author: icarot
  severity: high
  description: |
    Apache Casbin MCP Gateway server default login credentials were discovered.
  reference:
    - https://github.com/apache/casbin-mcp-gateway
  metadata:
    max-request: 2
    vendor: apache
    product: casbin-mcp-gateway
  tags: apache,casbin-mcp-gateway,default-login

http:
  - raw:
      - |
        POST /login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"username":"{{username}}","password":"{{password}}"}

    attack: pitchfork
    payloads:
      username:
        - alice
        - bob
      password:
        - password123
        - password456

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: content_type
        words:
          - "application/json"

      - type: word
        part: body
        words:
          - '"token":'
          - '"user":'
        condition: and

      - type: status
        status:
          - 200
