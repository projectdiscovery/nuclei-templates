id: teleport-version-check

info:
  name: Teleport Version Retrieval
  author: mahmoud0x00
  severity: info
  shodan-query: http.favicon.hash:544208100
  description: Teleport server version retrieve through `/webapi/ping` endpoint.
  tags: teleport,detect

requests:
  - method: GET
    path:
      - "{{BaseURL}}/webapi/ping"

    matchers:
      - type: regex
        regex:
          - '"server_version"\s*:\s*"\d+\.\d+\.\d+"'
        part: body
    extractors:
      - type: regex
        part: body
        regex:
          - '"server_version"\s*:\s*"(?P<version>\d+\.\d+\.\d+)"'
