id: leantime-detect

info:
  name: Leantime - Detect
  author: icarot
  severity: info
  description: |
    Detects a Leantime server, a project management system for non-project managers.
  reference:
    - https://github.com/Leantime/leantime
  classification:
    cpe: cpe:2.3:a:leantime:leantime:*:*:*:*:*:rust:*:*
  metadata:
    vendor: leantime
    product: leantime
    shodan-query:
      - title:"Leantime"
  tags: tech,leantime,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/auth/login"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Leantime</title>'
          - 'leantime-version'
          - 'Leantime'
        condition: and
      - type: status
        status:
          - 200
    extractors:
    - type: regex
      name: version
      group: 1
      regex:
        - '<meta name="leantime-version" content="(?<leantime_version>[0-9].[0-9].[0-9])">'
