id: langflow-detect

info:
  name: Langflow - Detect
  author: rxerium
  severity: info
  description: |
   Langflow was detected. Langflow is an open-source visual LLM flow builder built on LangChain, providing a drag-and-drop interface for building AI pipelines and agents. Exposed instances may allow access to AI workflow configurations and API keys.
  reference:
    - https://github.com/langflow-ai/langflow
    - https://docs.langflow.org/
  metadata:
    verified: true
    max-request: 2
    vendor: langflow-ai
    product: langflow
    shodan-query: 'http.title:"Langflow"'
  tags: tech,langflow,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/version"
      - "{{BaseURL}}"

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - '"package":"Langflow"'

      - type: word
        part: body
        words:
          - "<title>Langflow</title>"

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '"version"\s*:\s*"([0-9\.]+)"'
