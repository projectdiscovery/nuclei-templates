id: opendcim-detect

info:
  name: openDCIM - Detect
  author: rxerium
  severity: info
  description: |
    openDCIM is a web-based data centre infrastructure management application.
  reference:
    - https://opendcim.org
    - https://github.com/opendcim/openDCIM
  metadata:
    max-request: 1
    shodan-query: title:"openDCIM Data Center Inventory"
  tags: tech,opendcim,dcim,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>openDCIM Data Center Inventory"

      - type: status
        status:
          - 200
