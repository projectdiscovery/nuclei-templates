id: ivanti-xtraction-detect

info:
  name: Ivanti Xtraction - Detect
  author: rxerium
  severity: info
  description: |
    Detects Ivanti Xtraction, a reporting and dashboard platform used with Ivanti products.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cvss-score: 0.0
    cwe-id: CWE-200
  metadata:
    max-request: 1
    verified: true
    shodan-query: http.title:"Xtraction"
  tags: tech,ivanti,xtraction,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/xtraction"

    host-redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Xtraction</title>"
          - "application-name\" content=\"Xtraction"
          - "dev-extreme-ivanti.css"
        condition: and

      - type: status
        status:
          - 200
