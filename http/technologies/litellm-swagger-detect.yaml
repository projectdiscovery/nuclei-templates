id: litellm-swagger-detect

info:
  name: LiteLLM API - Swagger UI Detection
  author: rxerium
  severity: info
  description: |
    Detects exposed LiteLLM API Swagger UI interface. LiteLLM is a unified API for 100+ LLM providers (OpenAI, Azure, Anthropic, etc.).
  reference:
    - https://github.com/BerriAI/litellm
    - https://docs.litellm.ai/
  metadata:
    verified: true
    max-request: 1
    shodan-query: http.title:"LiteLLM API - Swagger UI"
  tags: tech,litellm,swagger,api,ai,llm

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>LiteLLM API - Swagger UI"

      - type: status
        status:
          - 200
