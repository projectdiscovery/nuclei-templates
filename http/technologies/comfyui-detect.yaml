id: comfyui-detect

info:
  name: ComfyUI - Detect
  author: rxerium
  severity: info
  description: |
    Detected ComfyUI, a node-based Stable Diffusion workflow editor. Custom nodes can execute arbitrary code without authentication.
  reference:
    - https://github.com/comfyanonymous/ComfyUI
  metadata:
    verified: true
    max-request: 2
    vendor: comfyanonymous
    product: comfyui
    shodan-query: http.title:"ComfyUI"
  tags: tech,comfyui,stable-diffusion,ai,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>ComfyUI'
        condition: or

      - type: status
        status:
          - 200
