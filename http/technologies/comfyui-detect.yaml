id: comfyui-detect

info:
  name: ComfyUI - Detect
  author: rxerium
  severity: info
  description: |
    Detected ComfyUI, a node-based Stable Diffusion workflow editor. Custom nodes can execute arbitrary code without authentication.
  reference:
    - https://github.com/comfyanonymous/ComfyUI
  metadata:
    verified: true
    max-request: 1
    vendor: comfyanonymous
    product: comfyui
    shodan-query: http.title:"ComfyUI"
  tags: tech,comfyui,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>ComfyUI'

      - type: status
        status:
          - 200
