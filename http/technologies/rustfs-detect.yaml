id: rustfs-detect

info:
  name: Rustfs - Detect
  author: icarot
  severity: info
  description: |
    Detects a Rustfs server, a high-performance, distributed object storage system built in Rust.
  reference:
    - https://github.com/rustfs/rustfs
  classification:
    cpe: cpe:2.3:a:rustfs:rustfs:*:*:*:*:*:rust:*:*
  metadata:
    vendor: rustfs
    product: rustfs
    shodan-query:
      - title:"RustFS"
  tags: tech,rustfs,rustfs,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/rustfs/console/auth/login"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>RustFS</title>'
          - 'rustfs'
        condition: and

      - type: status
        status:
          - 200
