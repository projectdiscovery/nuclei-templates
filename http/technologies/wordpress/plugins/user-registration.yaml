id: user-registration

info:
  name: WordPress User Registration & Membership Plugin Detection
  author: omarkurt
  severity: info
  description: |
    Detected WordPress User Registration & Membership plugin and its version information.
  reference:
    - https://wordpress.org/plugins/user-registration/
  metadata:
    max-request: 1
    verified: true
    shodan-query: "/wp-content/plugins/user-registration/"
  tags: wordpress,wp-plugin,user-registration,tech,wp

http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-content/plugins/user-registration/readme.txt"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "User Registration"
        part: body

      - type: regex
        part: body
        regex:
          - '(?i)Stable tag:\s*[\d.]+'

      - type: status
        status:
          - 200

    extractors:
      - type: regex
        name: version
        group: 1
        regex:
          - '(?i)Stable tag:\s*([\d.]+)'

      - type: dsl
        dsl:
          - '"[User Registration] detected on " + host + " (version: " + version + ")"'
