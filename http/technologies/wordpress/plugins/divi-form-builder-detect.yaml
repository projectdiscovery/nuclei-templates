id: divi-form-builder-detect

info:
  name: Divi Form Builder - Detect
  author: rxerium
  severity: info
  description: |
    Divi Form Builder is a premium WordPress form plugin by Divi Engine.
  reference:
    - https://diviengine.com/product/divi-form-builder/
  metadata:
    verified: true
    max-request: 1
    shodan-query: 'http.html:"wp-content/plugins/divi-form-builder"'
  tags: tech,wordpress,wp-plugin,divi-form-builder,divi

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "wp-content/plugins/divi-form-builder"

      - type: status
        status:
          - 200

    extractors:
      - type: regex
        name: version
        part: body
        group: 1
        regex:
          - 'divi-form-builder[^"'']*\?ver=([0-9.]+)'
