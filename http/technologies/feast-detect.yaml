id: feast-detect

info:
  name: Feast Feature Store - Detect
  author: rxerium
  severity: info
  description: |
    Detected Feast, an open-source feature store for managing and serving ML features.
  reference:
    - https://github.com/feast-dev/feast
    - https://feast.dev/
  metadata:
    verified: true
    max-request: 1
    vendor: feast
    product: feast
    shodan-query: http.title:"Feast Feature Store"
  tags: tech,feast,feature-store,ml,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/p/automl_pipeline"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Feast Feature Store'

      - type: status
        status:
          - 200
