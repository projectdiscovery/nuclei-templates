id: tibco-businessworks-detect

info:
  name: TIBCO BusinessWorks - Detect
  author: righettod
  severity: info
  description: |
    TIBCO BusinessWorks was detected - an enterprise integration and application development platform used to connect systems and data across an organization.
  reference:
    - https://docs.tibco.com/products/tibco-activematrix-businessworks
    - https://www.tibco.com/content/dam/tibco/documents/data-sheet/tibco-businessworks.pdf
  metadata:
    verified: true
    max-request: 1
    shodan-query: http.title:"TIBCO BusinessWorks"
  tags: tech,tibco,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: dsl
        dsl:
          - 'status_code == 200'
          - 'contains(to_lower(body), "<title>tibco businessworks")'
        condition: and