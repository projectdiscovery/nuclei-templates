id: bentoml-detect

info:
  name: BentoML Prediction Service Detection
  author: rxerium
  severity: info
  description: |
    Detects BentoML Prediction Service interface. BentoML is a platform for building, shipping, and scaling AI applications with any ML framework.
  reference:
    - https://www.bentoml.com/
    - https://github.com/bentoml/BentoML
  metadata:
    verified: true
    max-request: 1
  tags: tech,bentoml,ai,ml,prediction,mlops

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "<title>BentoML Prediction Service"
        part: body
