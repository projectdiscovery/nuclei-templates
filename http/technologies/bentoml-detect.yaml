id: bentoml-detect

info:
  name: BentoML Prediction Service - Detection
  author: rxerium
  severity: info
  description: |
    Detected BentoML Prediction Service interface. BentoML was a platform for building, shipping, and scaling AI applications with any ML framework.
  reference:
    - https://www.bentoml.com/
    - https://github.com/bentoml/BentoML
  metadata:
    verified: true
    max-request: 1
    shodan-query: html:"BentoML"
  tags: tech,bentoml,ai,ml,prediction,mlops

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>BentoML Prediction Service"

      - type: status
        status:
          - 200
