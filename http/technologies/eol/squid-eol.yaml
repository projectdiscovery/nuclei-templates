id: squid-eol

info:
  name: Squid End-of-Life - Detect
  author: Shivam Kamboj
  severity: info
  description: |
    Detected Squid proxy versions that have reached End-of-Life (EOL) and no longer receive security updates.
  reference:
    - https://endoflife.date/squid
    - https://www.squid-cache.org/Versions/
  metadata:
    verified: true
    max-request: 1
    shodan-query: "Server: squid/"
  tags: tech,squid,eol

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        name: version
        part: header
        group: 1
        regex:
          - '(?i)Server:\s*squid/([0-9.]+)'

    matchers:
      - type: dsl
        dsl:
          - compare_versions(version, '<=6.14')
          - contains(tolower(header), 'squid')
        condition: and
