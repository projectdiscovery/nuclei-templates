id: jaeger-eol

info:
  name: Jaeger End-of-Life - Detect
  author: Shivam Kamboj
  severity: info
  description: |
    Detected Jaeger versions that have reached End-of-Life (EOL) and no longer receive security updates.
  reference:
    - https://endoflife.date/jaeger
    - https://github.com/jaegertracing/jaeger/issues/6321
  metadata:
    verified: true
    max-request: 1
    shodan-query: "title:\"Jaeger UI\""
  tags: tech,jaeger,eol

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        part: body
        name: version
        group: 1
        regex:
          - '"gitVersion":"v?([0-9.]+)"'
          - '(?i)jaeger.*?v?([0-9]+\.[0-9.]+)'

    matchers:
      - type: dsl
        dsl:
          - 'len(version) > 0'
          - 'compare_versions(version, "<2.0")'
        condition: and
