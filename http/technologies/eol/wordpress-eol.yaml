id: wordpress-eol

info:
  name: WordPress End-of-Life - Detect
  author: Shivam Kamboj
  severity: info
  description: |
    Detected WordPress versions that have reached End-of-Life (EOL) and no longer receive security updates.
  reference:
    - https://endoflife.date/wordpress
    - https://wordpress.org/documentation/article/wordpress-versions/
  metadata:
    verified: true
    max-request: 1
    shodan-query: "WordPress"
  tags: tech,wordpress,eol

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        part: body
        name: version
        group: 1
        regex:
          - '(?i)<meta[^>]*name=["\'']?generator["\'']?[^>]*content=["\'']?WordPress\s+([0-9.]+)'
          - '(?i)Version\s+([0-9]+\.[0-9.]+)'

    matchers:
      - type: dsl
        dsl:
          - 'len(version) > 0'
          - 'compare_versions(version, "<6.9")'
        condition: and
