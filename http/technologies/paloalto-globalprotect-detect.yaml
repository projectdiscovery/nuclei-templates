id: paloalto-globalprotect-detect

info:
  name: Palo Alto Networks GlobalProtect - Detect
  author: jakxx
  severity: info
  description: |
    Palo Alto Networks GlobalProtect portal or gateway was detected.
  classification:
    cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cwe-id: CWE-200
    cpe: cpe:2.3:a:paloaltonetworks:globalprotect:*:*:*:*:*:*:*:*
  metadata:
    max-request: 3
    vendor: paloaltonetworks
    product: globalprotect
    shodan-query: http.html:"GlobalProtect"
  tags: tech,paloalto,globalprotect,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/global-protect/prelogin.esp"
      - "{{BaseURL}}/global-protect/login.esp"
      - "{{BaseURL}}/sslmgr"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<prelogin-response>"
          - "<title>GlobalProtect Portal</TITLE>"
          - "<msg>Invalid parameters</msg>"
        condition: or

      - type: status
        status:
          - 200