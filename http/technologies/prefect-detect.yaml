id: prefect-detect

info:
  name: Prefect - Detect
  author: rxerium
  severity: info
  description: |
    Detected Prefect, a modern workflow orchestration platform with Orion UI for managing data pipelines.
  reference:
    - https://github.com/PrefectHQ/prefect
    - https://www.prefect.io/
  metadata:
    verified: true
    max-request: 1
    shodan-query: '"Prefect" port:4200'
  tags: tech,prefect,workflow,orchestration,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: dsl
        dsl:
          - 'contains(tolower(header), "www-authenticate")'
          - 'contains(header, "Prefect UI - Restricted Access")'
        condition: and
