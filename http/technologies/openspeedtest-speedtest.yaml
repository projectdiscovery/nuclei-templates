id: openspeedtest-speedtest

info:
  name: OpenSpeedTest - Detect
  author: DhiyaneshDk
  severity: info
  description: |
    Detected the exposed default page of the OpenSpeedTest service.
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"Openspeedtest"
  tags: tech,openspeedtest,discovery

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    matchers:
      - type: word
        words:
          - "SpeedTest by OpenSpeedTest"
        part: body
