id: graphiql-exposure

info:
  name: GraphiQL - Exposure
  author: Vincent Olagbemide
  severity: low
  description: Detects publicly exposed GraphiQL consoles.
  reference:
    - https://github.com/graphql/graphiql
  metadata:
    verified: true
    max-request: 5
    shodan-query: html:"GraphiQL"
  tags: misconfig,graphql,graphiql,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/graphiql"
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"
      - "{{BaseURL}}/v1/graphql"
      - "{{BaseURL}}/query"
      - "{{BaseURL}}"

    redirects: true
    max-redirects: 2
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "graphiql.createFetcher"
          - "id=\"graphiql\""
          - "id='graphiql'"
          - "/graphiql.css"
        condition: or

      - type: status
        status:
          - 200
