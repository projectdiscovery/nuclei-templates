id: chromadb-unauth-api-exposure

info:
  name: ChromaDB - Unauthenticated API Access
  author: DevamShah
  severity: high
  description: |
    ChromaDB was detected with anonymous access to the collections API. ChromaDB
    deployments without `CHROMA_SERVER_AUTHN_PROVIDER` configured (the default
    when running `chroma run` or the official Docker image without explicit auth
    settings) expose /api/v1/collections and /api/v2/tenants to the public,
    allowing any visitor to enumerate every collection, fetch embedded
    documents, and add or delete vectors.
  impact: |
    Vector databases commonly store embedded copies of enterprise documents,
    customer support transcripts, source code, and proprietary knowledge bases
    used as RAG context. Anonymous access to the collections API leaks the
    underlying corpus and allows attackers to poison retrieval by inserting
    adversarial embeddings that influence downstream LLM responses.
  remediation: |
    Set CHROMA_SERVER_AUTHN_PROVIDER (e.g., chromadb.auth.token_authn.TokenAuthenticationServerProvider)
    and CHROMA_SERVER_AUTHN_CREDENTIALS, restart the server, and verify
    /api/v1/collections returns 401 without credentials. Place the instance
    behind a reverse proxy that enforces authentication if running an older
    Chroma version that lacks built-in auth.
  reference:
    - https://docs.trychroma.com/deployment/auth
    - https://github.com/chroma-core/chroma/blob/main/docs/docs.trychroma.com/markdoc/content/docs/overview/security-practices.md
    - https://github.com/chroma-core/chroma
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:L
    cvss-score: 9.4
    cwe-id: CWE-862
  metadata:
    verified: true
    max-request: 2
    vendor: chroma-core
    product: chromadb
    shodan-query:
      - 'http.html:"chroma"'
      - 'http.title:"ChromaDB"'
    fofa-query: body="chroma" && body="api/v1"
  tags: chromadb,vector-database,rag,llm,ai,misconfig,unauth,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v2/tenants/default_tenant/databases/default_database/collections"
      - "{{BaseURL}}/api/v1/collections"

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: dsl
        name: v2-collections-listed
        dsl:
          - 'status_code == 200'
          - 'contains(content_type, "application/json")'
          - 'contains_all(body, "\"id\":", "\"name\":", "\"tenant\":")'
        condition: and

      - type: dsl
        name: v1-collections-listed
        dsl:
          - 'status_code == 200'
          - 'contains(content_type, "application/json")'
          - 'contains_all(body, "\"id\":", "\"name\":", "\"metadata\":")'
        condition: and

    extractors:
      - type: json
        name: collections
        part: body
        json:
          - '.[]?.name'
