id: opencode-web-unauth-access

info:
  name: OpenCode Web - Unauthenticated Access
  author: Kazgangap
  severity: medium
  description: |
    Detects unauthenticated network access to the OpenCode web interface. When the OpenCode web server is started without setting the OPENCODE_SERVER_PASSWORD environment variable, the server is completely unsecured. If exposed to the network, it allows unauthorized attackers to access the AI coding environment.
  reference:
    - https://opencode.ai/docs/tr/web/
  metadata:
    verified: true
    max-request: 1
    vendor: opencode
    product: opencode
    shodan-query: http.html:"opencode"
    fofa-query: body="opencode"
  tags: opencode,web,unauth,exposure,misconfig

http:
  - method: GET
    path:
      - "{{BaseURL}}/Lw/session/"

    redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - 'contains_all(body, "<title>OpenCode</title>", "opencode-theme-id")'
          - 'status_code == 200'
        condition: and
