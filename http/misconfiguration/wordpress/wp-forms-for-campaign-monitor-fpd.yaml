id: wp-forms-for-campaign-monitor-fpd

info:
  name: WordPress Forms for Campaign Monitor - Full Path Disclosure
  author: aushack
  severity: low
  description: |
    The Campaign Monitor for WordPress plugin for WordPress is vulnerable to Full Path Disclosure in all versions up to, and including, 2.8.15.
    This is due the plugin not properly restricting direct access to /forms/views/admin/create.php and display_errors being enabled
  reference:
    - https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/forms-for-campaign-monitor/campaign-monitor-for-wordpress-2815-unauthenticated-full-path-disclosure
    - https://wordpress.org/plugins/forms-for-campaign-monitor/
  metadata:
    verified: true
    max-request: 2
    publicwww-query: "/wp-content/plugins/advanced-responsive-video-embedder/"
  tags: wp,wordpress,wp-plugin,fpd,campaigns,misconfig

http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-content/plugins/forms-for-campaign-monitor/forms/views/admin/create.php"

    stop-at-first-match: true

    matchers:
      - type: dsl
        dsl:
          - 'contains_all(body, "Fatal error", "Uncaught Error") || contains_all(body, "Stack trace")'
          - 'contains(body, "forms-for-campaign-monitor")'
          - 'status_code == 200 || status_code == 500'
        condition: and

