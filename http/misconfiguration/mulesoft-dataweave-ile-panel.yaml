id: mulesoft-dataweave-ile-panel

info:
  name: MuleSoft DataWeave Interactive Learning Environment - Detect
  author: Th3l0newolf
  severity: critical
  description: |
    Unauthorised server side code execution engine exposed to internet.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cwe-id: CWE-94
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"DataWeave Interactive Learning Environment"
  tags: panel,mulesoft,dataweave,rce,critical,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        condition: and
        words:
          - "<title>DataWeave Interactive Learning Environment | MuleSoft Developers</title>"
          - "Weaving the interactive tutorial...&nbsp"

      - type: status
        status:
          - 200
