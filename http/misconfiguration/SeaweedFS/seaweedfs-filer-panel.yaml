id: seaweedfs-filer-panel

info:
  name: SeaweedFS Filer - Unauthenticated Access
  author: Th3l0newolf
  severity: critical
  description: |
    SeaweedFS Filer interface is exposed without authentication.
    Unauthenticated users may be able to upload, modify, or access files,
    potentially leading to malicious file hosting, data exposure, or remote compromise.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cwe-id: CWE-306
  metadata:
    max-request: 1
    verified: true
    shodan-query: html:"SeaweedFS Filer"
  tags: panel,seaweedfs,filer,storage,unauth,critical

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - "<title>\\s*SeaweedFS Filer.*</title>"

      - type: word
        part: body
        condition: and
        words:
          - "</span> New Folder"
          - "</span> Upload"

      - type: status
        status:
          - 200
