id: synology-dsm-system-info

info:
  name: Synology DSM System Info - Exposure
  author: DhiyaneshDk
  severity: info
  description: |
    Synology DiskStation Manager (DSM) exposes system information through the SYNO.API.Info endpoint without authentication, revealing all available APIs, versions, and installed packages.
  reference:
    - https://www.synology.com/en-us/dsm
  metadata:
    verified: true
    max-request: 1
    shodan-query: html:"Synology&nbsp;DiskStation"
    fofa-query: body="Synology&nbsp;DiskStation"
    product: diskstation_manager
    vendor: synology
  tags: synology,dsm,misconfig,diskstation-manager,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/webapi/entry.cgi?api=SYNO.API.Info&version=1&method=query&query=all"

    matchers:
      - type: dsl
        dsl:
          - 'contains_any(body, "SYNO.Core.", "SYNO.FileStation.", "SYNO.DSM.")'
          - 'contains(header, "application/json")'
          - 'contains(body, "success\":true")'
          - 'status_code == 200'
        condition: and
