id: google-api-key-gemini-files-check

info:
  name: Google API Key - Gemini Files API Exposure Check
  author: Mestizo 
  severity: High
  description: |
    Detects exposed Google API keys and validates whether they can be used to access
    the Gemini Files API endpoint. Successful exploitation allows unauthorized access
    to private data (files, datasets, cached contents) and may enable quota exhaustion
    and financial impact via API abuse.
  reference:
    - https://trufflesecurity.com/blog/google-api-keys-werent-secrets-but-then-gemini-changed-the-rules

  classification:
    cwe-id:
      - CWE-1188
      - CWE-269
    cvss-metrics: CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:N/VI:N/VA:N/SC:H/SI:N/SA:H
    cvss-score: 8.7

  metadata:
    max-request: 2

  tags: exposure,google,apikey,gemini,generative-ai,cwe-1188,cwe-269

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        name: google_api_key
        part: body
        internal: true
        group: 0
        regex:
          - 'AIza[0-9A-Za-z\-_]{35}'

  - method: GET
    path:
      - "https://generativelanguage.googleapis.com/v1beta/files?key={{google_api_key}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
