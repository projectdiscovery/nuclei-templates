id: azure-apim-secretkey

info:
  name: Azure - APIM Secret Key
  author: israel comazzetto dos reis
  severity: info
  description: Azure APIM Secret Key
  classification:
    cwe-id: CWE-522,CWE-540
  metadata:
    verified: true
    max-request: 1
    shodan-query: html:"Ocp-Apim-Subscription-Key"
  tags: azure,apim,microsoft,exposure,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"Ocp-Apim-Subscription-Key":'

      - type: status
        status:
          - 200
