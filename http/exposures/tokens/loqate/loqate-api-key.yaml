id: loqate-api-key

info:
  name: Loqate API Key
  author: realexp3rt
  severity: low
  description: Loqate API Key is leaked.
  reference:
    - https://www.loqate.com/en-gb/home/
  classification:
    cwe-id: CWE-522,CWE-540
  metadata:
    max-request: 1
  tags: exposure,token,loqate,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        part: body
        regex:
          - "[A-Z]{2}[0-9]{2}-[A-Z]{2}[0-9]{2}-[A-Z]{2}[0-9]{2}-[A-Z]{2}[0-9]{2}"
