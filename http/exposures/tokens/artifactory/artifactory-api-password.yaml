id: artifactory-api-password

info:
  name: Artifactory Password Disclosure
  author: Ice3man
  severity: info
  reference:
    - https://jfrog.com/help/r/jfrog-rest-apis/introduction-to-the-artifactory-rest-apis
  classification:
    cwe-id: CWE-522,CWE-540
  metadata:
    max-request: 1
  tags: exposure,token,artifactory,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        part: body
        regex:
          - '(?:\s|=|:|"|^)AP[\dABCDEF][a-zA-Z0-9]{8,}$'
