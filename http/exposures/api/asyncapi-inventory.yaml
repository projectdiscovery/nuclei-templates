id: asyncapi-inventory
info:
  name: AsyncAPI Spec Inventory (JSON/YAML)
  author: Hamza Sahin
  severity: info
  description: Locates exposed AsyncAPI specifications which may reveal event-driven API surface.
  tags:
    - api
    - asyncapi
    - inventory
    - exposure
    - web

requests:
  - method: GET
    path:
      - "{{BaseURL}}/asyncapi.json"
      - "{{BaseURL}}/asyncapi.yaml"
      - "{{BaseURL}}/asyncapi.yml"
      - "{{BaseURL}}/api/asyncapi.json"
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: header
        words:
          - "application/json"
          - "application/yaml"
          - "text/yaml"
          - "text/plain"
      - type: regex
        part: body
        regex:
          - "(?i)\\basyncapi\\b\\s*[:\"]\\s*\"?2\\."
