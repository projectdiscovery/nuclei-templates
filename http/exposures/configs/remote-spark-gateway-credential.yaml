id: remote-spark-gateway-credential

info:
  name: Remote Spark Gateway Credentials - Detect
  author: domwhewell-sage
  severity: high
  description: Remote Spark Gateway credentials found via /gateway.conf, if remote manage is enabled access via /config.html may also be possible.
  reference:
    - https://docs.sparkview.info/books/sparkview-admin-manual/page/31-gateway
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
    cwe-id: CWE-200
  metadata:
    verified: true
    max-request: 1
    shodan-query: 'http.html:"SparkView"'
    fofa-query: 'body="sparkview"'
  tags: config,exposure,remote-spark,credential,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}/gateway.conf"

    matchers-condition: and
    matchers:
      - type: regex
        condition: and
        regex:
          - 'password\s*=\s*'

      - type: dsl
        dsl:
          - "!contains(tolower(body), '<html')"
          - "!contains(tolower(body), '<body')"
        condition: and

      - type: status
        status:
          - 200

    extractors:
      - type: regex
        part: body
        regex:
          - "remoteManage=([^\\s]+)"
          - "password=([^\\s]+)"