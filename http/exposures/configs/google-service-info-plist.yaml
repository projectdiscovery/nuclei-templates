id: google-service-info-plist

info:
  name: GoogleService-Info.plist Exposure
  author: cyberguy-somnath
  severity: medium
  description: Firebase iOS configuration file was detected.
  remediation: Remove the configuration file from the web root and restrict public access.
  reference:
    - https://firebase.google.com/docs/ios/setup
  classification:
    cwe-id: CWE-200
  metadata:
    max-request: 1
  tags: config,exposure,firebase,ios

http:
  - method: GET
    path:
      - "{{BaseURL}}/GoogleService-Info.plist"

    matchers:
      - type: dsl
        dsl:
          - "contains(body, '<key>GOOGLE_APP_ID</key>') && contains(body, '<key>PROJECT_ID</key>') && status_code == 200"
