id: hexstrike-ai-config

info:
  name: HexStrike AI MCP Agents - Detection
  author: icarot
  severity: medium
  description: |
    Detects if the config page of the HexStrike AI MCP Agents server is exposed, it is an advanced MCP server that lets AI agents (Claude, GPT, Copilot, etc.) autonomously run 150+ cybersecurity tools for automated pentesting, vulnerability discovery, bug bounty automation, and security research. Seamlessly bridge LLMs with real-world offensive security capabilities.
  reference:
    - https://github.com/0x4m4/hexstrike-ai
  metadata:
    max-request: 1
    shodan-query: http.html:"HexStrike AI Tools API Server is operational"
    vendor: hexstrike-ai
    product: hexstrike-ai
  tags: hexstrike-ai,config,exposure
http:
  - method: GET
    path:
      - "{{BaseURL}}/health"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'HexStrike'
          - 'telemetry'
          - 'tools_status'
          - 'uptime'
          - 'version'
        condition: and
      - type: status
        status:
          - 200
    extractors:
      - type: json
        json:
          - ".version"
