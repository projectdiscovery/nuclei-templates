id: hexstrike-ai-config

info:
  name: HexStrike AI MCP Agents - Detection
  author: icarot
  severity: info
  description: |
    Detected the config page of the HexStrike AI MCP Agents server was exposed.
  reference:
    - https://github.com/0x4m4/hexstrike-ai
  metadata:
    max-request: 1
    shodan-query: http.html:"HexStrike"
    vendor: hexstrike-ai
    product: hexstrike-ai
  tags: config,exposure,hexstrike-ai

http:
  - method: GET
    path:
      - "{{BaseURL}}/health"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'HexStrike'
          - 'telemetry'
          - 'tools_status'
          - 'uptime'
          - 'version'
        condition: and

      - type: status
        status:
          - 200

    extractors:
      - type: json
        name: version
        json:
          - ".version"
