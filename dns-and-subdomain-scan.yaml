id: dns-and-subdomain-scan

info:
  name: DNS and Subdomain Enumeration
  author: ProjectDiscoveryAI
  severity: info
  description: |
    This template performs DNS record enumeration and subdomain discovery for the target network.
  tags: dns,subdomain

dns:
  - name: "{{Hostname}}"
    type: A
    matchers:
      - type: status
        status:
          - 0  # Match if DNS resolution is successful

  - name: "{{Hostname}}"
    type: CNAME
    matchers:
      - type: status
        status:
          - 0  # Match if DNS resolution is successful

  - name: "{{Hostname}}"
    type: ANY
    matchers:
      - type: status
        status:
          - 0  # Match if any DNS record is found